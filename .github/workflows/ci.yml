name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 门禁：Entity-Flyway 对齐检查
  # 规则：每新增 @TableField("xxx") 必须有对应 Flyway 脚本，否则阻断整个 CI
  # ──────────────────────────────────────────────────────────────────────────
  entity-flyway-check:
    name: Entity-Flyway 字段对齐门禁
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码（含上一次提交，diff 对比用）
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 2          # 需要 HEAD~1 做基准

    - name: 检查新增 @TableField 是否有 Flyway 迁移脚本
      run: python3 scripts/check-entity-flyway.py

  # ──────────────────────────────────────────────────────────────────────────
  # 门禁：Flyway SQL 语法校验（P0 强制）
  # 覆盖：版本号重复/缺少分号/末尾逗号/动态SQL字符串字面量/DEFAULT NULL/危险操作
  # ──────────────────────────────────────────────────────────────────────────
  flyway-sql-lint:
    name: Flyway SQL 语法校验门禁
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 2

    - name: 校验 Flyway 迁移脚本
      run: python3 scripts/check-flyway-sql.py --diff

    - name: 校验新增迁移的列依赖（拦截引用不存在列的事故）
      run: python3 scripts/check-flyway-column-deps.py

  # ──────────────────────────────────────────────────────────────────────────
  # 门禁：生产配置安全扫描
  # 检查：弱密钥、硬编码密码、不安全CORS、测试配置泄漏等
  # ──────────────────────────────────────────────────────────────────────────
  security-config-scan:
    name: 生产配置安全扫描
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v6

    - name: 扫描不安全配置
      run: |
        echo "🔍 开始生产配置安全扫描..."
        ERRORS=0

        # 1. 检查生产CORS是否包含localhost或http
        if grep -q "localhost" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "❌ 生产CORS配置包含localhost"
          ERRORS=$((ERRORS + 1))
        fi
        if grep -q "http://" backend/src/main/resources/application-prod.yml 2>/dev/null | grep -v "#"; then
          echo "⚠️  生产CORS配置包含HTTP协议源"
          ERRORS=$((ERRORS + 1))
        fi

        # 2. 检查生产配置是否使用弱JWT密钥
        if grep -q "ThisIsA_LocalJwtSecret" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "❌ 生产环境使用开发JWT密钥"
          ERRORS=$((ERRORS + 1))
        fi

        # 3. 检查生产配置是否使用弱数据库密码
        if grep -q "changeme" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "❌ 生产环境使用弱数据库密码"
          ERRORS=$((ERRORS + 1))
        fi

        # 4. 检查生产环境是否开启微信Mock
        if grep -q "mock-enabled: true" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "❌ 生产环境开启了微信Mock模式"
          ERRORS=$((ERRORS + 1))
        fi

        # 5. 检查前端是否有localhost硬编码（排除配置文件和构建脚本）
        FOUND_LOCALHOST=$(grep -rn "localhost:5173\|localhost:8080\|localhost:8088" \
          frontend/src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "vite.config\|.env\|node_modules" || true)
        if [ -n "$FOUND_LOCALHOST" ]; then
          echo "⚠️  前端源码中发现localhost硬编码:"
          echo "$FOUND_LOCALHOST"
          ERRORS=$((ERRORS + 1))
        fi

        # 6. 检查回调URL占位符
        if grep -q "你的域名" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "⚠️  生产配置中存在'你的域名'占位符"
        fi

        # 7. 检查 cloudbaserc.json 探针配置（P0：INC-20260612-001）
        echo ""
        echo "🔍 检查 cloudbaserc.json 探针配置..."
        INITIAL_DELAY=$(grep -oE '"initialDelaySeconds"[[:space:]]*:[[:space:]]*[0-9]+' cloudbaserc.json | grep -oE '[0-9]+' | head -1)
        if [ -z "$INITIAL_DELAY" ]; then
          echo "❌ cloudbaserc.json 缺少 initialDelaySeconds 配置"
          ERRORS=$((ERRORS + 1))
        elif [ "$INITIAL_DELAY" -lt 200 ]; then
          echo "❌ initialDelaySeconds=$INITIAL_DELAY 太小（应用启动需 90s+，建议 ≥300）"
          ERRORS=$((ERRORS + 1))
        else
          echo "✅ initialDelaySeconds=$INITIAL_DELAY"
        fi

        # 8. 检查前端是否有生产环境不应有的console.log
        BARE_CONSOLE=$(grep -rn "console\.log" frontend/src/ --include="*.ts" --include="*.tsx" 2>/dev/null \
          | grep -v "isDev\|import.meta.env.DEV\|logger\|errorHandling\|wrap(\|//.*console\|console\.log(res\|console\.log(stats\|console\.log(config" || true)
        if [ -n "$BARE_CONSOLE" ]; then
          CONSOLE_COUNT=$(echo "$BARE_CONSOLE" | wc -l)
          echo "⚠️  前端源码中发现 ${CONSOLE_COUNT} 处未守卫的console.log（生产构建会自动移除，建议清理）"
        fi

        if [ $ERRORS -gt 0 ]; then
          echo ""
          echo "❌ 安全扫描发现 ${ERRORS} 个问题，请修复后重新提交"
          exit 1
        fi

        echo "✅ 安全扫描通过"

  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    needs: [entity-flyway-check, flyway-sql-lint, security-config-scan]

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: 后端编译 + Checkstyle 代码规范检查
      working-directory: ./backend
      run: |
        mvn clean compile checkstyle:check -q

    - name: 运行后端单元测试 + Jacoco覆盖率报告
      working-directory: ./backend
      run: |
        mvn test jacoco:report \
          -Dspring.profiles.active=test \
          -DexcludedGroups=integration \
          -Dsurefire.failIfNoSpecifiedTests=false

    - name: 输出测试统计
      working-directory: ./backend
      run: |
        TEST_COUNT=$(find target/surefire-reports -name "*.xml" 2>/dev/null | wc -l)
        if [ "$TEST_COUNT" -gt 0 ]; then
          echo "✅ 共找到 ${TEST_COUNT} 个测试报告"
          grep -h "testcase" target/surefire-reports/*.xml 2>/dev/null | wc -l | xargs echo "✅ 测试用例总数:"
        else
          echo "⚠️  当前没有测试用例（surefire-reports 为空）"
        fi
        if [ -f target/site/jacoco/index.html ]; then
          echo "📊 Jacoco覆盖率报告: target/site/jacoco/index.html"
        fi

  frontend-lint:
    name: 前端代码规范检查 (ESLint + TypeScript)
    runs-on: ubuntu-latest
    needs: [entity-flyway-check, flyway-sql-lint, security-config-scan]

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: 安装依赖
      working-directory: ./frontend
      run: npm install --legacy-peer-deps

    - name: ESLint 代码规范检查
      working-directory: ./frontend
      run: npm run lint

    - name: TypeScript 类型检查
      working-directory: ./frontend
      run: npx tsc --noEmit

  frontend-build:
    name: 前端构建
    runs-on: ubuntu-latest
    needs: [entity-flyway-check, frontend-lint]

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: 安装依赖
      working-directory: ./frontend
      run: npm install --legacy-peer-deps

    - name: 运行构建
      working-directory: ./frontend
      run: npm run build

    - name: 上传构建产物
      uses: actions/upload-artifact@v7
      with:
        name: frontend-dist
        path: frontend/dist
        retention-days: 7

  deploy:
    name: 部署到微信云托管
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 下载前端构建产物
      uses: actions/download-artifact@v5
      with:
        name: frontend-dist
        path: frontend/dist

    - name: 注入构建时间戳（强制前端容器缓存失效）
      run: echo "BUILD_DATE=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_ENV

    - name: 写入构建时间到前端Dockerfile构建参数
      run: |
        sed -i "s/ARG BUILD_DATE=unknown/ARG BUILD_DATE=$BUILD_DATE/" frontend/Dockerfile

    - name: 部署到腾讯云 CloudBase
      uses: TencentCloudBase/cloudbase-action@v2
      with:
        secretId: ${{ secrets.CLOUDBASE_SECRET_ID }}
        secretKey: ${{ secrets.CLOUDBASE_SECRET_KEY }}
        envId: ${{ secrets.CLOUDBASE_ENV_ID }}

  postdeploy-smoke-test:
    name: 部署后冒烟测试（P0门控）
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # 部署后服务启动需要时间，给足重试空间

    steps:
    - name: 检出代码
      uses: actions/checkout@v6

    - name: 等待服务启动（90s）
      run: sleep 90

    - name: 运行部署后冒烟测试
      env:
        # 未配置 SMOKE_BASE_URL secret 时，回退到生产域名
        SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL || 'https://api.webyszl.cn' }}
        SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME || 'admin' }}
        SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD || 'admin123' }}
        SMOKE_TENANT_ID: ${{ secrets.SMOKE_TENANT_ID || '1' }}
        SMOKE_FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        SMOKE_MAX_RETRIES: '12'
      run: python3 scripts/postdeploy-smoke-test.py

  create-release-tag:
    name: 创建发布标签
    runs-on: ubuntu-latest
    needs: [deploy, postdeploy-smoke-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 创建版本标签
      run: |
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
        if echo "$CHANGED_FILES" | grep -q "^\.github/workflows/"; then
          echo "跳过打标签: 本次提交包含 workflow 文件变更，GITHUB_TOKEN 无 workflows 权限"
          exit 0
        fi
        VERSION=$(grep -m1 '<version>' backend/pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
        TAG="v${VERSION}-$(date +%Y%m%d-%H%M%S)"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$TAG"
        git push origin "$TAG"
        echo "已创建标签: $TAG"

  notify:
    name: 通知结果
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, deploy, postdeploy-smoke-test]
    if: always()

    steps:
    - name: 发送通知
      run: |
        echo "CI/CD Pipeline 完成"
        echo "后端测试: ${{ needs.backend-test.result }}"
        echo "前端构建: ${{ needs.frontend-build.result }}"
        echo "部署结果: ${{ needs.deploy.result }}"
        echo "冒烟测试: ${{ needs.postdeploy-smoke-test.result }}"
        if [ "${{ needs.postdeploy-smoke-test.result }}" = "failure" ]; then
          echo "🚨 冒烟测试失败！服务可能不可用，请立即排查或回滚。"
        fi
