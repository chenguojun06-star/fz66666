name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: changeme
          MYSQL_DATABASE: fashion_supplychain
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: 运行后端测试
      working-directory: ./backend
      run: |
        mvn clean test -Dtest="QualityScanExecutorTest,WarehouseScanExecutorTest,ProductionScanExecutorTest,ProductionOrderOrchestratorTest,MaterialReconciliationOrchestratorTest*,ProductWarehousingOrchestratorTest*"
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3308/fashion_supplychain
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: changeme

    - name: 生成测试覆盖率报告
      working-directory: ./backend
      run: mvn jacoco:report

    - name: 上传覆盖率报告
      uses: codecov/codecov-action@v4
      with:
        files: ./backend/target/site/jacoco/jacoco.xml
        flags: backend
        fail_ci_if_error: false

  frontend-build:
    name: 前端构建
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: 安装依赖
      working-directory: ./frontend
      run: npm install

    - name: 运行构建
      working-directory: ./frontend
      run: npm run build

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist
        retention-days: 7

  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 完整历史用于SonarCloud分析

    - name: 设置 JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: SonarCloud 扫描
      working-directory: ./backend
      run: |
        mvn verify sonar:sonar \
          -Dsonar.projectKey=fashion-supplychain \
          -Dsonar.organization=your-org \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      continue-on-error: true  # 可选，防止SonarCloud失败阻止CI

  notify:
    name: 通知结果
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, code-quality]
    if: always()

    steps:
    - name: 发送通知
      run: |
        echo "CI/CD Pipeline 完成"
        echo "后端测试: ${{ needs.backend-test.result }}"
        echo "前端构建: ${{ needs.frontend-build.result }}"
        echo "代码质量: ${{ needs.code-quality.result }}"
