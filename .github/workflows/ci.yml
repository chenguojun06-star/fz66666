name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  entity-flyway-check:
    name: Entity-Flyway 字段对齐门禁
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码（含上一次提交，diff 对比用）
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 2

    - name: 检查新增 @TableField 是否有 Flyway 迁移脚本
      run: python3 scripts/check-entity-flyway.py

  security-config-scan:
    name: 生产配置安全扫描
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 扫描不安全配置
      run: |
        echo "🔍 开始生产配置安全扫描..."
        ERRORS=0

        if grep -q "localhost" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "❌ 生产CORS配置包含localhost"
          ERRORS=$((ERRORS + 1))
        fi
        if grep -q "http://" backend/src/main/resources/application-prod.yml 2>/dev/null | grep -v "#"; then
          echo "⚠️  生产CORS配置包含HTTP协议源"
          ERRORS=$((ERRORS + 1))
        fi

        if grep -q "ThisIsA_LocalJwtSecret" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "❌ 生产环境使用开发JWT密钥"
          ERRORS=$((ERRORS + 1))
        fi

        if grep -q "changeme" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "❌ 生产环境使用弱数据库密码"
          ERRORS=$((ERRORS + 1))
        fi

        if grep -q "mock-enabled: true" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "❌ 生产环境开启了微信Mock模式"
          ERRORS=$((ERRORS + 1))
        fi

        FOUND_LOCALHOST=$(grep -rn "localhost:5173\|localhost:8080\|localhost:8088" \
          frontend/src/ --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "vite.config\|.env\|node_modules" || true)
        if [ -n "$FOUND_LOCALHOST" ]; then
          echo "⚠️  前端源码中发现localhost硬编码:"
          echo "$FOUND_LOCALHOST"
          ERRORS=$((ERRORS + 1))
        fi

        if grep -q "你的域名" backend/src/main/resources/application-prod.yml 2>/dev/null; then
          echo "⚠️  生产配置中存在'你的域名'占位符"
        fi

        BARE_CONSOLE=$(grep -rn "console\.log" frontend/src/ --include="*.ts" --include="*.tsx" 2>/dev/null \
          | grep -v "isDev\|import.meta.env.DEV\|logger\|errorHandling\|wrap(\|//.*console\|console\.log(res\|console\.log(stats\|console\.log(config" || true)
        if [ -n "$BARE_CONSOLE" ]; then
          CONSOLE_COUNT=$(echo "$BARE_CONSOLE" | wc -l)
          echo "⚠️  前端源码中发现 ${CONSOLE_COUNT} 处未守卫的console.log（生产构建会自动移除，建议清理）"
        fi

        if [ $ERRORS -gt 0 ]; then
          echo ""
          echo "❌ 安全扫描发现 ${ERRORS} 个问题，请修复后重新提交"
          exit 1
        fi

        echo "✅ 安全扫描通过"

  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    needs: [entity-flyway-check, security-config-scan]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: 后端编译 + Checkstyle 代码规范检查
      working-directory: ./backend
      run: |
        mvn clean compile checkstyle:check -q

    - name: 运行后端单元测试（全量，排除integration组）
      working-directory: ./backend
      run: |
        mvn test \
          -Dspring.profiles.active=test \
          -DexcludedGroups=integration \
          -Dsurefire.failIfNoSpecifiedTests=false

  frontend-lint:
    name: 前端 ESLint 规范检查
    runs-on: ubuntu-latest
    needs: [entity-flyway-check, security-config-scan]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: 安装依赖
      working-directory: ./frontend
      run: npm ci --legacy-peer-deps

    - name: ESLint 代码规范检查
      working-directory: ./frontend
      run: npm run lint

  frontend-typecheck:
    name: 前端 TypeScript 类型检查
    runs-on: ubuntu-latest
    needs: [entity-flyway-check, security-config-scan]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: 安装依赖
      working-directory: ./frontend
      run: npm ci --legacy-peer-deps

    - name: TypeScript 类型检查
      working-directory: ./frontend
      run: npx tsc --noEmit

  frontend-build:
    name: 前端构建
    runs-on: ubuntu-latest
    needs: [frontend-lint, frontend-typecheck]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: 安装依赖
      working-directory: ./frontend
      run: npm ci --legacy-peer-deps

    - name: 运行构建
      working-directory: ./frontend
      run: npm run build

  frontend-package-upload:
    name: 前端制品上传
    runs-on: ubuntu-latest
    needs: [frontend-build]

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: 安装依赖
      working-directory: ./frontend
      run: npm ci --legacy-peer-deps

    - name: 运行构建
      working-directory: ./frontend
      run: npm run build

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist
        retention-days: 7

  deploy:
    name: 部署到微信云托管
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint, frontend-typecheck, frontend-build, frontend-package-upload]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 注入构建时间戳（强制前端容器缓存失效）
      run: echo "BUILD_DATE=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_ENV

    - name: 写入构建时间到前端Dockerfile构建参数
      run: |
        sed -i "s/ARG BUILD_DATE=unknown/ARG BUILD_DATE=$BUILD_DATE/" frontend/Dockerfile

    - name: 部署到腾讯云 CloudBase
      uses: TencentCloudBase/cloudbase-action@v2
      with:
        secretId: ${{ secrets.CLOUDBASE_SECRET_ID }}
        secretKey: ${{ secrets.CLOUDBASE_SECRET_KEY }}
        envId: ${{ secrets.CLOUDBASE_ENV_ID }}

  create-release-tag:
    name: 创建发布标签
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 创建版本标签
      run: |
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
        if echo "$CHANGED_FILES" | grep -q "^\.github/workflows/"; then
          echo "跳过打标签: 本次提交包含 workflow 文件变更，GITHUB_TOKEN 无 workflows 权限"
          exit 0
        fi
        VERSION=$(grep -m1 '<version>' backend/pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
        TAG="v${VERSION}-$(date +%Y%m%d-%H%M%S)"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$TAG"
        git push origin "$TAG"
        echo "已创建标签: $TAG"

  notify:
    name: 通知结果
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint, frontend-typecheck, frontend-build, frontend-package-upload, deploy]
    if: always()

    steps:
    - name: 发送通知
      run: |
        echo "CI/CD Pipeline 完成"
        echo "后端测试: ${{ needs.backend-test.result }}"
        echo "前端ESLint: ${{ needs.frontend-lint.result }}"
        echo "前端TypeScript: ${{ needs.frontend-typecheck.result }}"
        echo "前端构建: ${{ needs.frontend-build.result }}"
        echo "前端制品: ${{ needs.frontend-package-upload.result }}"
        echo "部署结果: ${{ needs.deploy.result }}"
