name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 门禁：Entity-Flyway 对齐检查
  # 规则：每新增 @TableField("xxx") 必须有对应 Flyway 脚本，否则阻断整个 CI
  # ──────────────────────────────────────────────────────────────────────────
  entity-flyway-check:
    name: Entity-Flyway 字段对齐门禁
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码（含上一次提交，diff 对比用）
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 2          # 需要 HEAD~1 做基准

    - name: 检查新增 @TableField 是否有 Flyway 迁移脚本
      run: python3 scripts/check-entity-flyway.py

  backend-test:
    name: 后端测试
    runs-on: ubuntu-latest
    needs: [entity-flyway-check]

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: 运行后端单元测试（纯Mock，无需数据库）
      working-directory: ./backend
      run: |
        mvn clean test \
          -Dtest="ProductionOrderOrchestratorTest,MaterialReconciliationOrchestratorTest*,ProductWarehousingOrchestratorTest*" \
          -Dspring.profiles.active=test \
          -DfailIfNoTests=false

  frontend-lint:
    name: 前端代码规范检查 (ESLint + TypeScript)
    runs-on: ubuntu-latest
    needs: [entity-flyway-check]

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: 安装依赖
      working-directory: ./frontend
      run: npm install --legacy-peer-deps

    - name: ESLint 代码规范检查
      working-directory: ./frontend
      run: npm run lint

    - name: TypeScript 类型检查
      working-directory: ./frontend
      run: npx tsc --noEmit

  frontend-build:
    name: 前端构建
    runs-on: ubuntu-latest
    needs: [entity-flyway-check, frontend-lint]

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 设置 Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: 安装依赖
      working-directory: ./frontend
      run: npm install --legacy-peer-deps

    - name: 运行构建
      working-directory: ./frontend
      run: npm run build

    - name: 上传构建产物
      uses: actions/upload-artifact@v7
      with:
        name: frontend-dist
        path: frontend/dist
        retention-days: 7

  deploy:
    name: 部署到微信云托管
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 注入构建时间戳（强制前端容器缓存失效）
      run: echo "BUILD_DATE=$(date -u +%Y%m%d%H%M%S)" >> $GITHUB_ENV

    - name: 写入构建时间到前端Dockerfile构建参数
      run: |
        sed -i "s/ARG BUILD_DATE=unknown/ARG BUILD_DATE=$BUILD_DATE/" frontend/Dockerfile

    - name: 部署到腾讯云 CloudBase
      uses: TencentCloudBase/cloudbase-action@v2
      with:
        secretId: ${{ secrets.CLOUDBASE_SECRET_ID }}
        secretKey: ${{ secrets.CLOUDBASE_SECRET_KEY }}
        envId: ${{ secrets.CLOUDBASE_ENV_ID }}

  create-release-tag:
    name: 创建发布标签
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: 创建版本标签
      run: |
        VERSION=$(grep -m1 '<version>' backend/pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/' | tr -d '[:space:]')
        TAG="v${VERSION}-$(date +%Y%m%d-%H%M%S)"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag "$TAG"
        git push origin "$TAG"
        echo "已创建标签: $TAG"

  notify:
    name: 通知结果
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, deploy]
    if: always()

    steps:
    - name: 发送通知
      run: |
        echo "CI/CD Pipeline 完成"
        echo "后端测试: ${{ needs.backend-test.result }}"
        echo "前端构建: ${{ needs.frontend-build.result }}"
        echo "部署结果: ${{ needs.deploy.result }}"
