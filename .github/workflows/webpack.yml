name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: 20.17.0
      NPM_VERSION: 11.7.0
      JAVA_VERSION: 17
      MAVEN_VERSION: 3.9.9

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Enable npm via Corepack
        run: |
          corepack enable
          corepack prepare npm@${{ env.NPM_VERSION }} --activate

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Compute quality score
        working-directory: frontend
        env:
          QUALITY_SCORE_MIN: 45
        run: |
          npm run quality:score | tee quality-score.json
          node -e "const fs=require('fs');const sha=process.env.GITHUB_SHA||'';const ref=process.env.GITHUB_REF||'';const runId=process.env.GITHUB_RUN_ID||'';const raw=fs.readFileSync('quality-score.json','utf8');const j=JSON.parse(raw);j.ci={sha,ref,runId};fs.writeFileSync('quality-score.json',JSON.stringify(j,null,2)+'\\n');"

      - name: Upload quality score snapshot
        uses: actions/upload-artifact@v4
        with:
          name: quality-score
          path: frontend/quality-score.json

      - name: Run backend tests
        working-directory: backend
        run: mvn -B -ntp test

      - name: Build backend
        working-directory: backend
        run: mvn -B -ntp clean package -DskipTests

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/target/*.jar
