name: Deploy Frontend (Admin) to WeChat Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  FRONTEND_DIR: frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Build Frontend
        run: npm run build
        working-directory: ${{ env.FRONTEND_DIR }}

      - name: Verify build output
        run: |
          if [ ! -d "${{ env.FRONTEND_DIR }}/dist" ]; then
            echo "ERROR: Build output directory not found"
            exit 1
          fi
          FILE_COUNT=$(find ${{ env.FRONTEND_DIR }}/dist -type f | wc -l)
          echo "Build output contains $FILE_COUNT files"
          ls -la ${{ env.FRONTEND_DIR }}/dist/

      - name: Login to WeChat Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: ccr.ccs.tencentyun.com
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.FRONTEND_DIR }}
          push: true
          tags: |
            ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/fashion-frontend:${{ github.sha }}
            ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/fashion-frontend:latest
          build-args: |
            BUILD_DATE=${{ github.run_number }}
            BACKEND_URL=http://fashion-backend:8080

      - name: Deploy to WeChat Cloud Run
        run: |
          curl -s -X POST \
            "https://run.tencentcloudapi.com" \
            -H "Authorization: TC3-HMAC-SHA256 Credential=${{ secrets.TCB_SECRET_ID }}" \
            -H "Content-Type: application/json" \
            -d '{
              "EnvId": "${{ secrets.TCB_ENV_ID }}",
              "ServiceName": "fashion-frontend",
              "ImageName": "ccr.ccs.tencentyun.com/${{ secrets.TCR_NAMESPACE }}/fashion-frontend:${{ github.sha }}",
              "ContainerPort": 80
            }' || echo "Deploy trigger sent"

      - name: Deploy notification
        if: always()
        run: |
          echo "========================================="
          echo "Frontend (Admin) Deployment Status: ${{ job.status }}"
          echo "Deploy Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "========================================="
