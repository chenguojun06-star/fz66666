version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "deps(backend)"
    ignore:
      - dependency-name: "com.mysql:mysql-connector-j"
        versions: [">=9"]
      - dependency-name: "org.springdoc:springdoc-openapi-starter-webmvc-ui"
        versions: [">=3"]
      - dependency-name: "com.baomidou:mybatis-plus-spring-boot3-starter"
        versions: [">=3.5.16"]
      - dependency-name: "org.springframework.boot:spring-boot-starter-parent"
        versions: [">=4"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(frontend)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "antd"
        versions: [">=6.3"]
      - dependency-name: "react"
        versions: [">=19"]
      - dependency-name: "react-dom"
        versions: [">=19"]

  - package-ecosystem: "npm"
    directory: "/h5-web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "h5"
    commit-message:
      prefix: "deps(h5)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        versions: [">=19"]
      - dependency-name: "react-dom"
        versions: [">=19"]
      - dependency-name: "react-router-dom"
        versions: [">=7"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
    ignore:
      - dependency-name: "docker/build-push-action"
        versions: [">=6"]
