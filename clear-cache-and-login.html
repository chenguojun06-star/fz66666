<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>清除缓存并重新登录</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2D7FF9;
            margin-bottom: 20px;
        }
        .step {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 4px;
            border-left: 4px solid #2D7FF9;
        }
        .button {
            background: #2D7FF9;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        .button:hover {
            background: #1a6de0;
        }
        .success {
            color: #52C41A;
            font-weight: bold;
        }
        .error {
            color: #F5222D;
            font-weight: bold;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            display: none;
        }
        .info {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 清除缓存并重新登录</h1>

        <div class="info">
            <strong>问题原因：</strong>浏览器中的旧Token包含<code>self</code>权限，需要清除后重新登录获取<code>all</code>权限的新Token。
        </div>

        <div class="step">
            <h3>步骤 1：清除浏览器缓存</h3>
            <button class="button" onclick="clearCache()">点击清除缓存</button>
            <p style="margin-top: 10px; color: #666; font-size: 14px;">
                或手动操作：F12 → Application → Local Storage → 右键 Clear
            </p>
        </div>

        <div class="step">
            <h3>步骤 2：跳转到登录页</h3>
            <button class="button" onclick="goToLogin()">跳转到登录页</button>
        </div>

        <div class="step">
            <h3>步骤 3：登录信息</h3>
            <p><strong>用户名：</strong> <code>admin</code></p>
            <p><strong>密码：</strong> <code>admin123</code></p>
        </div>

        <div id="result"></div>

        <hr style="margin: 30px 0; border: none; border-top: 1px solid #e0e0e0;">

        <div class="step">
            <h3>🔍 检查当前Token状态</h3>
            <button class="button" onclick="checkToken()">检查Token</button>
            <div id="tokenInfo" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        function clearCache() {
            try {
                // 清除localStorage
                localStorage.clear();

                // 清除sessionStorage
                sessionStorage.clear();

                // 尝试清除所有cookie
                document.cookie.split(";").forEach(function(c) {
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
                });

                showResult('✅ 缓存已清除！请点击"跳转到登录页"按钮重新登录。', 'success');
            } catch (e) {
                showResult('❌ 清除失败：' + e.message, 'error');
            }
        }

        function goToLogin() {
            // 清除缓存
            clearCache();

            // 延迟跳转，确保清除完成
            setTimeout(() => {
                window.location.href = 'http://localhost:5173/login';
            }, 500);
        }

        function checkToken() {
            const token = localStorage.getItem('token') || localStorage.getItem('auth_token') || localStorage.getItem('authToken');
            const tokenInfo = document.getElementById('tokenInfo');

            if (!token) {
                tokenInfo.innerHTML = '<p class="error">❌ 未找到Token，需要重新登录</p>';
                return;
            }

            try {
                // 解析JWT Token
                const parts = token.split('.');
                if (parts.length !== 3) {
                    tokenInfo.innerHTML = '<p class="error">❌ Token格式错误</p>';
                    return;
                }

                const payload = JSON.parse(atob(parts[1]));
                const permRange = payload.permRange || payload.permission_range || '未知';
                const userName = payload.uname || payload.username || '未知';
                const exp = payload.exp ? new Date(payload.exp * 1000).toLocaleString() : '未知';
                const now = Date.now();
                const isExpired = payload.exp && (payload.exp * 1000 < now);

                let html = '<div style="font-family: monospace; font-size: 12px; background: #f5f5f5; padding: 10px; border-radius: 4px;">';
                html += `<p><strong>用户：</strong> ${userName}</p>`;
                html += `<p><strong>权限范围：</strong> <span style="color: ${permRange === 'all' ? '#52C41A' : '#F5222D'}; font-weight: bold;">${permRange}</span></p>`;
                html += `<p><strong>过期时间：</strong> ${exp}</p>`;
                html += `<p><strong>状态：</strong> ${isExpired ? '<span class="error">已过期</span>' : '<span class="success">有效</span>'}</p>`;
                html += '</div>';

                if (permRange !== 'all') {
                    html += '<p class="error" style="margin-top: 10px;">⚠️ 权限不足！需要清除缓存并重新登录。</p>';
                } else if (isExpired) {
                    html += '<p class="error" style="margin-top: 10px;">⚠️ Token已过期！需要重新登录。</p>';
                } else {
                    html += '<p class="success" style="margin-top: 10px;">✅ Token有效且权限正确！</p>';
                }

                tokenInfo.innerHTML = html;
            } catch (e) {
                tokenInfo.innerHTML = '<p class="error">❌ 解析Token失败：' + e.message + '</p>';
            }
        }

        function showResult(message, type) {
            const result = document.getElementById('result');
            result.className = type;
            result.innerHTML = message;
            result.style.display = 'block';
            result.style.background = type === 'success' ? '#f6ffed' : '#fff2f0';
            result.style.border = type === 'success' ? '1px solid #b7eb8f' : '1px solid #ffccc7';
        }

        // 页面加载时自动检查Token
        window.onload = function() {
            checkToken();
        };
    </script>
</body>
</html>
