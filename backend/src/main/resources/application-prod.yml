# 生产环境配置
# 所有敏感配置通过环境变量注入，不要在此文件中硬编码

spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      chat:
        enabled: true
  datasource:
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:100}
      minimum-idle: ${HIKARI_MIN_IDLE:20}
      connection-timeout: 30000
      idle-timeout: 180000
      max-lifetime: 1200000
      keepalive-time: 120000
      connection-test-query: SELECT 1
      data-source-properties:
        socketTimeout: 30000
        connectTimeout: 10000

  # Flyway 10.x 默认只接受纯数字版本号 (V1.0.0)。
  # 项目迁移文件使用时间戳格式 (V202608051300)，必须显式配置。
  # 写在这里而不是 flyway.conf，确保云端打包时一定被读取。
  flyway:
    sql-migration-version-format: TIMESTAMP

  # Redis 生产配置（可选，不可用时降级为单机模式）
  data:
    redis:
      host: ${SPRING_REDIS_HOST:127.0.0.1}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: ${SPRING_REDIS_TIMEOUT_MS:5000}ms
      connect-timeout: ${SPRING_REDIS_CONNECT_TIMEOUT_MS:2000}ms
      lettuce:
        shutdown-timeout: ${SPRING_REDIS_SHUTDOWN_TIMEOUT_MS:200}ms
        pool:
          max-active: ${SPRING_REDIS_POOL_MAX_ACTIVE:64}
          max-idle: ${SPRING_REDIS_POOL_MAX_IDLE:32}
          min-idle: ${SPRING_REDIS_POOL_MIN_IDLE:8}
          max-wait: ${SPRING_REDIS_POOL_MAX_WAIT:3000}ms

  # 生产环境启用 Flyway 进行数据库迁移管理
  level:
    com.fashion.supplychain: info
    org.springframework: warn
    org.springframework.web: warn
    org.springframework.security: warn
    org.apache.ibatis: warn
    com.baomidou.mybatisplus: warn
  file:
    name: /logs/fashion-supplychain.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 5GB

# 生产环境禁用数据库初始化器（使用 Flyway 管理）
fashion:
  db:
    initializer-enabled: false
    schema-preflight-enabled: ${FASHION_DB_SCHEMA_PREFLIGHT_ENABLED:true}
  upload-path: /uploads/
  # 腾讯云 COS 文件存储（可选，配置后自动启用）
  # 必需设置以下环境变量：COS_SECRET_ID、COS_SECRET_KEY、COS_BUCKET
  cos:
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-shanghai}
    bucket: ${COS_BUCKET:}

# 生产环境 CORS（允许微信云托管默认域名和自定义域名）
app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.tcloudbase.com,https://*.ap-shanghai.service.tcloudbase.com,https://www.webyszl.cn,https://webyszl.cn,https://api.webyszl.cn,https://h5.webyszl.cn}
    allow-credentials: true
  security:
    # 生产建议配置 APP_SECURITY_PII_ENCRYPTION_KEY 专属密钥；未配置时使用内置回退密钥
    pii-encryption-key: ${APP_SECURITY_PII_ENCRYPTION_KEY:FashionCloud2026PiiKeyFallback@Prod}

# 生产环境隐藏健康检查详情
management:
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: false

# 微信云托管环境：开放接口服务内网代理使用自签名证书，需信任
wechat:
  mini-program:
    trust-all-certs: ${WECHAT_TRUST_ALL_CERTS:true}

ai:
  openai-compat:
    enabled: ${AI_OPENAI_COMPAT_ENABLED:true}
    api-key: ${AI_OPENAI_COMPAT_API_KEY:}
    api-key-map: ${AI_OPENAI_COMPAT_API_KEY_MAP:}
    tenant-id: ${AI_OPENAI_COMPAT_TENANT_ID:}
    model-name: ${AI_OPENAI_COMPAT_MODEL_NAME:xiaoyun-agent}

# 小云 AI Agent 运行参数（运维可调，无需改代码）
xiaoyun:
  agent:
    max-system-prompt-chars: ${XIAOYUN_MAX_PROMPT_CHARS:8000}
    token-budget: ${XIAOYUN_TOKEN_BUDGET:30000}
    timeout-ms: ${XIAOYUN_AGENT_TIMEOUT_MS:180000}
    context-refresh-ms: ${XIAOYUN_CONTEXT_REFRESH_MS:600000}
    quick-path-timeout-ms: ${XIAOYUN_QUICK_PATH_TIMEOUT_MS:15000}
    sse-heartbeat-interval-s: ${XIAOYUN_SSE_HEARTBEAT_INTERVAL:15}
    rag:
      recall-top-k: ${XIAOYUN_RAG_RECALL_TOP_K:3}
      similarity-threshold: ${XIAOYUN_RAG_SIMILARITY_THRESHOLD:0.45}
    tool-discovery:
      enabled: ${XIAOYUN_TOOL_DISCOVERY_ENABLED:true}
      min-tool-count-for-rag: ${XIAOYUN_TOOL_DISCOVERY_MIN_COUNT:30}
      top-k: ${XIAOYUN_TOOL_DISCOVERY_TOP_K:10}
  digital-twin:
    enabled: ${XIAOYUN_DIGITAL_TWIN_ENABLED:true}
    cache-ttl-seconds: ${XIAOYUN_DIGITAL_TWIN_CACHE_TTL:60}
    build-timeout-seconds: ${XIAOYUN_DIGITAL_TWIN_BUILD_TIMEOUT:8}
  streaming:
    enhanced-events: ${XIAOYUN_STREAMING_ENHANCED:true}
    step-progress: ${XIAOYUN_STREAMING_STEP_PROGRESS:true}
    tool-animation: ${XIAOYUN_STREAMING_TOOL_ANIMATION:true}
    mood-updates: ${XIAOYUN_STREAMING_MOOD:true}
    time-budget: ${XIAOYUN_STREAMING_TIME_BUDGET:true}
