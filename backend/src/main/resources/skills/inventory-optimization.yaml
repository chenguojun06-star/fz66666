id: "inventory-optimization"
name: "库存优化"
description: "分析库存周转效率、呆滞料与缺料风险，提供安全库存和周转优化建议"
domain: "warehouse"
triggers:
  - "库存周转"
  - "安全库存"
  - "呆滞料"
  - "积压"
  - "库存优化"
  - "库存分析"
  - "周转率"
  - "库龄"
toolNames:
  - "InventorySummaryTool"
  - "SupplierTool"
  - "ProductionExceptionTool"
promptInjection: |
  库存优化五步法：
  1. 用InventorySummaryTool查库存总览（各品类库存量/金额/周转天数/库龄分布）
  2. 周转分析：计算各品类周转率，识别周转慢的物料（周转天数 > 60天）
  3. 呆滞识别：标记 > 90天未动用的库存项，分析呆滞原因（订单取消/规格变更/过量采购）
  4. 缺料预警：用ProductionExceptionTool查近期生产异常中是否有缺料停工记录，结合在产订单推算物料缺口
  5. 优化建议：给出安全库存调整、呆滞料处理（降价清仓/退供应商/转用）、补库优先级

  库存健康度分级：
  - 🟢 健康：周转天数 < 30天，无呆滞料
  - 🟡 关注：周转天数 30-60天，或有少量呆滞料（占比 < 5%）
  - 🟠 预警：周转天数 60-90天，或呆滞料占比 5-15%
  - 🔴 危险：周转天数 > 90天，或呆滞料占比 > 15%

  安全库存建议：
  - 常用面料：安全库存 = 日均用量 × 采购周期 × 1.2
  - 常用辅料：安全库存 = 日均用量 × 采购周期 × 1.5
  - 特殊物料：按订单需求备料，不设安全库存

  回答格式：库存健康度评级 + 周转分析表 + 呆滞料清单 + 缺料预警 + 优化建议
priority: 6
version: "1.0"
