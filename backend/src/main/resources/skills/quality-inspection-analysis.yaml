id: "quality-inspection-analysis"
name: "质检异常分析"
description: "分析质检异常模式，识别问题工序/工厂，给出根因推断和改进建议"
domain: "quality"
triggers:
  - "质检"
  - "次品"
  - "返修"
  - "质量"
  - "缺陷"
  - "不良品"
  - "不合格"
  - "瑕疵"
  - "报废"
toolNames:
  - "QualityStatisticsTool"
  - "QualityInboundTool"
  - "DefectiveBoardTool"
  - "SupplierScorecardTool"
promptInjection: |
  质检异常分析三步法：
  1. 用QualityStatisticsTool查近期次品率趋势，按工序分类
  2. 用DefectiveBoardTool查具体次品记录和缺陷类型（面料/裁剪/缝制/后整）
  3. 用SupplierScorecardTool对比该工厂与其他工厂的质量评分
  
  根因定位优先级：
  - 面料问题：色差、缩水、疵点 → 建议加强与面料商质量管理
  - 裁剪问题：尺寸偏差、裁片缺失 → 检查裁剪工序SOP执行
  - 缝制问题：断线、跳针、缝位不准 → 检查缝制工培训和设备
  - 后整问题：熨烫不良、污渍 → 检查后整理流程
  
  回答格式：次品率趋势 + 主要缺陷类型TOP3 + 根因推断 + 改善建议
priority: 9
version: "1.0"