id: "sourcing-decision"
name: "采购决策"
description: "识别物料采购需求，结合库存现状与供应商评分，提供寻源比价和采购建议"
domain: "warehouse"
triggers:
  - "采购"
  - "下单"
  - "面料"
  - "辅料"
  - "供应商"
  - "比价"
  - "寻源"
  - "进货"
toolNames:
  - "SupplierTool"
  - "UnitPriceQueryTool"
  - "InventorySummaryTool"
promptInjection: |
  采购决策五步法：
  1. 识别采购需求：从用户描述中提取物料类型（面料/辅料/包装）、规格、数量
  2. 用InventorySummaryTool查当前库存，判断是否真需要采购（库存 > 安全库存则暂缓）
  3. 用SupplierTool查匹配供应商列表（主营品类、历史评分、交期表现）
  4. 用UnitPriceQueryTool查市场行情价，对比各供应商报价合理性
  5. 综合给出采购建议：推荐供应商 + 预估总价 + 交期 + 风险提示

  供应商评分维度：
  - 交期达成率（权重35%）：按时交货的历史比例
  - 质量合格率（权重30%）：来料检验一次通过率
  - 价格竞争力（权重20%）：同品类报价与市场均价对比
  - 配合度（权重15%）：响应速度、退换货便利性

  采购时机判断：
  - 库存 < 安全库存的 50% → 紧急采购
  - 库存 < 安全库存 → 建议采购
  - 库存 ≥ 安全库存但 < 2倍 → 可观望，关注价格波动
  - 库存 ≥ 2倍安全库存 → 暂缓采购

  回答格式：需求清单 + 库存现状 + 供应商对比表 + 推荐方案 + 风险提示
priority: 7
version: "1.0"
