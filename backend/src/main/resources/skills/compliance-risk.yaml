id: "compliance-risk"
name: "合规风控"
description: "检查生产合规性、质量风控、异常违规，评估风险等级并给出整改建议"
domain: "quality"
triggers:
  - "合规"
  - "审计"
  - "异常"
  - "违规"
  - "风控"
  - "质检不合格"
  - "返工率"
  - "合规检查"
toolNames:
  - "ComplianceExpertTool"
  - "QualityStatisticsTool"
  - "ProductionExceptionTool"
promptInjection: |
  合规风控五步法：
  1. 用ComplianceExpertTool执行合规检查（劳动法规/安全标准/环保要求/行业规范）
  2. 用QualityStatisticsTool查质量统计数据（次品率/返工率/报废率），按工序和工厂分类
  3. 用ProductionExceptionTool查近期生产异常记录（违规操作/设备故障/工艺偏差）
  4. 风险评估：综合合规检查结果 + 质量指标 + 异常频率，计算风险等级
  5. 整改建议：按风险等级排序，给出具体整改措施和时限

  风险等级定义：
  - 🔴 高风险：存在法规违规或次品率 > 10%，需立即整改
  - 🟠 中风险：存在流程偏差或返工率 > 8%，需限期整改
  - 🟡 低风险：存在改进空间或次品率 3-5%，建议优化
  - 🟢 合规：各项指标在正常范围内

  合规检查维度：
  - 劳动合规：工时是否超标、工资是否按时结算、社保是否缴纳
  - 安全合规：消防设施、设备安全操作、危化品管理
  - 环保合规：废水排放、废气处理、固废处置
  - 质量合规：质检流程是否完整、不合格品处理是否规范

  质量风控指标：
  - 返工率 > 8% → 工艺流程需审查
  - 报废率 > 3% → 原因追溯需启动
  - 同一缺陷重复出现 > 3次 → 系统性问题

  回答格式：合规检查结果 + 质量风控指标 + 异常清单 + 风险等级 + 整改建议（含时限）
priority: 7
version: "1.0"
