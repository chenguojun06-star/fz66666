# 本地开发环境配置（不上传到 Git）

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3308/fashion_supplychain?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: changeme
  data:
    redis:
      host: 127.0.0.1
      port: 6379

app:
  auth:
    jwt-secret: ThisIsA_LocalJwtSecret_OnlyForDev_0123456789
    header-auth-enabled: true
  cors:
    # 本地开发允许 localhost 和内网 IP（生产环境由 application-prod.yml 或环境变量覆盖）
    allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*,http://192.168.*.*:*,http://10.*.*.*:*,http://172.16.*.*:*,http://172.17.*.*:*,http://172.18.*.*:*,http://172.19.*.*:*,http://172.20.*.*:*,http://172.21.*.*:*,http://172.22.*.*:*,http://172.23.*.*:*,http://172.24.*.*:*,http://172.25.*.*:*,http://172.26.*.*:*,http://172.27.*.*:*,http://172.28.*.*:*,http://172.29.*.*:*,http://172.30.*.*:*,http://172.31.*.*:*,https://*.vercel.app

fashion:
  db:
    initializer-enabled: true

wechat:
  mini-program:
    mock-enabled: true

ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
  doubao:
    api-key: ${DOUBAO_API_KEY:}
  gateway:
    litellm:
      enabled: ${AI_LITELLM_ENABLED:false}
      base-url: ${AI_LITELLM_BASE_URL:}

logging:
  level:
    com.fashion.supplychain: debug
