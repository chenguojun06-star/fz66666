server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/wasm font/opentype font/ttf font/woff font/woff2 application/vnd.ms-fontobject;

    # 兼容历史版本中“根路径哈希资源”请求：
    # 例如 /LoginPage-xxxx.js，当前新包实际位于 /assets/LoginPage-xxxx.js
    location ~* ^/[A-Za-z0-9_-]+-[A-Za-z0-9_-]+\.(js|css)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri /assets$uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|json|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location / {
        try_files $uri @spa_fallback;
    }

    error_page 404 @spa_fallback;
    location @spa_fallback {
        if ($request_uri ~* "\.(js|css|png|jpg|jpeg|gif|webp|svg|ico|bmp|pdf|zip|rar|tar|gz|mp3|mp4|woff|woff2|ttf|eot|otf|map|json|wasm)$") {
            return 404;
        }
        rewrite ^ /index.html last;
    }
}
