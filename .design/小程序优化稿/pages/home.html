/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Anchors follow Apple Human Interface Guidelines system colors
 *      (System Blue #007AFF, System Green #34C759, System Red #FF3B30,
 *      system grays / label / background colors).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff; /* @primary */
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

/*
 * components.css - aggregated component CSS
 * Auto-extracted from preview/component-*.html files.

 * source: preview/component-button.html

 */
/* @anatomy
   <div class="row"><span class="label">Primary 56</span><button class="btn btn-primary btn-lg">Buy now</button><button class="btn btn-primary btn-lg" disabled>Buy now</button></div>
*/
.btn{display:inline-flex;align-items:center;justify-content:center;gap:calc(var(--spacing)*1.5);height:40px;padding:0 20px;border:none;border-radius:calc(var(--radius)*2);background:transparent;color:var(--foreground);font:600 14px/1 var(--font-sans);letter-spacing:var(--tracking-normal);white-space:nowrap;box-shadow:var(--shadow-sm);cursor:pointer;transition:background-color .18s ease,color .18s ease,opacity .18s ease,filter .18s ease}
.btn:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.btn:disabled{opacity:.42;cursor:not-allowed}
.btn-primary{background:var(--primary);color:var(--primary-foreground)}
.btn-primary:hover{filter:brightness(.96)}
.btn-secondary{height:48px;padding:0 24px;background:var(--secondary);color:var(--secondary-foreground)}
.btn-secondary:hover{background:var(--muted)}
.btn-text{height:48px;padding:0 4px;box-shadow:none}
.btn-text:hover{color:var(--primary)}
.btn-lg{height:56px;padding:0 28px;font-size:16px}

/* ============================================================
 * Card
 * source: preview/component-card.html
 * rules: 12
 */
/* @anatomy
   <div class="row">
   <span class="label">Info</span>
   <article class="card">
   <div><div class="eyebrow">Pinguo Apple</div>
*/
.card{width:188px;min-height:148px;padding:calc(var(--spacing)*5);display:flex;flex-direction:column;justify-content:space-between;background:var(--card);color:var(--card-foreground);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.card.disabled,.card.disabled:hover{opacity:.5;transform:none;box-shadow:var(--shadow-md)}
.eyebrow,.meta{color:var(--muted-foreground);font-size:11px;letter-spacing:.08em;text-transform:uppercase}
.title{margin:6px 0 8px;font-size:18px;line-height:1.15}
.body-copy{margin:0;color:var(--muted-foreground);font-size:13px}
.cta{display:inline-flex;align-items:center;justify-content:center;width:max-content;margin-top:12px;padding:calc(var(--spacing)*2) calc(var(--spacing)*3.5);border-radius:999px;background:var(--primary);color:var(--primary-foreground);font-size:12px;font-weight:700;text-decoration:none}
.media{aspect-ratio:4/3;border-radius:calc(var(--radius) - 4px);background:linear-gradient(135deg,var(--secondary),var(--accent));border:1px solid var(--border)}
.media-card{min-height:212px;padding:calc(var(--spacing)*4)}
.media-card .title{font-size:16px;margin:10px 0 6px}
.price{font-size:12px;color:var(--muted-foreground)}
.dark{background:var(--card);color:var(--card-foreground)}

/* ============================================================
 * Comparison Table
 * source: preview/component-comparison-table.html
 * rules: 13
 */
/* @anatomy
   <div class="row"><span class="label">Default</span><div class="t"><div class="c m">Compare models</div>
*/
.t{display:grid;grid-template-columns:96px repeat(3,1fr);overflow:hidden;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--card-foreground);box-shadow:var(--shadow-sm)}
.q{grid-template-columns:82px repeat(4,1fr)}
.c{padding:10px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.t>.c:nth-child(4n),.q>.c:nth-child(5n){border-right:0}
.t>.c:nth-last-child(-n+4),.q>.c:nth-last-child(-n+5){border-bottom:0}
.m{background:var(--background);color:var(--muted-foreground);font:700 10px/1 var(--font-mono);letter-spacing:.12em;text-transform:uppercase}
.h{background:var(--background);font-weight:700}
.k{display:block;font-size:14px;line-height:1.1}
.s{display:block;margin-top:4px;color:var(--chart-2);font-size:11px;font-weight:700}
.b .k{color:var(--chart-2)}
.v{font-weight:600}
.n{color:var(--muted-foreground);font-size:12px}
.x{opacity:.45}

/* ============================================================

.dark{background:var(--sidebar);color:var(--foreground)}

.mobile{padding:calc(var(--spacing)*2);border-radius:calc(var(--radius)*1.1);background:var(--card)}

            <div class="flex items-start justify-between">
              <div class="min-w-0">
                <h1 class="text-[20px] font-semibold leading-tight truncate" style="color: var(--foreground); letter-spacing: -0.3px;">李师傅，下午好</h1>
                <p class="text-[13px] mt-1" style="color: var(--muted-foreground);">东方制衣厂</p>
              </div>
              <div class="text-right shrink-0 ml-4">
                <div class="text-[28px] font-bold leading-none" style="color: var(--foreground); font-family: var(--font-mono);">12</div>
                <div class="text-[12px] mt-1" style="color: var(--muted-foreground);">7月 周日</div>
              </div>
            </div>
          </div>

          <!-- Daily tip card -->
          <div class="rounded-[14px] border p-3.5 mb-4" style="background: var(--card); border-color: var(--border);">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-[8px] flex items-center justify-center shrink-0" style="background: var(--accent);">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><path d="M10 2a6 6 0 0 0-4 10.5c.5.5 1 1.2 1 2v.5h6v-.5c0-.8.5-1.5 1-2A6 6 0 0 0 10 2z"/><path d="M8 17h4M9 19h2"/></svg>
              </div>
              <p class="text-[14px] leading-[1.5] flex-1 min-w-0" style="color: var(--foreground);">今日有 3 个订单临近交期，请关注进度</p>
            </div>
          </div>

          <!-- 常用应用 section -->
          <div class="mb-4">
            <div class="flex items-center justify-between mb-3 px-1">
              <h2 class="text-[17px] font-semibold" style="color: var(--foreground);">常用应用</h2>
              <button class="text-[14px] font-medium transition-opacity duration-200 hover:opacity-70 motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="color: var(--primary); outline-color: var(--ring);">管理</button>
            </div>
            <div class="rounded-[14px] border p-4" style="background: var(--card); border-color: var(--border);">
              <div class="grid grid-cols-3 gap-2">

                <!-- 1. 运营看板 — 环形图+指标卡 -->
                <button class="flex flex-col items-center gap-1.5 rounded-[8px] p-1 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="outline-color: var(--ring);">
                  <div class="w-14 h-14 rounded-[14px] flex items-center justify-center" style="background: rgba(88,86,214,0.1);">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #5856D6;"><path d="M14 4a10 10 0 1 0 10 10"/><path d="M14 4v10h10" stroke-dasharray="2 2"/><rect x="4" y="20" width="4" height="3" rx="0.5" fill="currentColor" stroke="none"/><rect x="9" y="18" width="4" height="5" rx="0.5" fill="currentColor" stroke="none" opacity="0.5"/></svg>
                  </div>
                  <span class="text-[13px] font-medium" style="color: var(--foreground);">运营看板</span>
                </button>

                <!-- 2. 下单管理 — 单据+加号 -->
                <button class="flex flex-col items-center gap-1.5 rounded-[8px] p-1 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="outline-color: var(--ring);">
                  <div class="w-14 h-14 rounded-[14px] flex items-center justify-center" style="background: rgba(0,122,255,0.1);">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #007AFF;"><path d="M8 3h8l4 4v16a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M16 3v4h4"/><path d="M14 12v6M11 15h6"/></svg>
                  </div>
                  <span class="text-[13px] font-medium" style="color: var(--foreground);">下单管理</span>
                </button>

                <!-- 3. 生产管理 (badge: 3) — 进度条 -->
                <button class="flex flex-col items-center gap-1.5 rounded-[8px] p-1 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="outline-color: var(--ring);">
                  <div class="relative">
                    <div class="w-14 h-14 rounded-[14px] flex items-center justify-center" style="background: rgba(0,199,190,0.1);">
                      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #00C7BE;"><rect x="4" y="6" width="20" height="3" rx="1.5"/><path d="M4 7.5h13" stroke-width="3" stroke="currentColor"/><rect x="4" y="12" width="20" height="3" rx="1.5"/><path d="M4 13.5h9" stroke-width="3" stroke="currentColor"/><rect x="4" y="18" width="20" height="3" rx="1.5"/><path d="M4 19.5h16" stroke-width="3" stroke="currentColor"/></svg>
                    </div>
                    <span class="absolute -top-1 -right-1 min-w-[18px] h-[18px] px-1 rounded-full flex items-center justify-center text-[11px] font-semibold" style="background: var(--destructive); color: var(--destructive-foreground); font-family: var(--font-mono);">3</span>
                  </div>
                  <span class="text-[13px] font-medium" style="color: var(--foreground);">生产管理</span>
                </button>

                <!-- 4. 质检通知 — 放大镜+对勾 -->
                <button class="flex flex-col items-center gap-1.5 rounded-[8px] p-1 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="outline-color: var(--ring);">
                  <div class="w-14 h-14 rounded-[14px] flex items-center justify-center" style="background: rgba(255,149,0,0.1);">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #FF9500;"><circle cx="12" cy="12" r="7"/><path d="M17 17l6 6"/><path d="M9 12l2 2 4-4"/></svg>
                  </div>
                  <span class="text-[13px] font-medium" style="color: var(--foreground);">质检通知</span>
                </button>

                <!-- 5. 生产扫码 — 扫码框 -->
                <button class="flex flex-col items-center gap-1.5 rounded-[8px] p-1 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="outline-color: var(--ring);">
                  <div class="w-14 h-14 rounded-[14px] flex items-center justify-center" style="background: rgba(52,199,89,0.1);">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #34C759;"><path d="M4 8V5a1 1 0 0 1 1-1h3M20 4h3a1 1 0 0 1 1 1v3M24 20v3a1 1 0 0 1-1 1h-3M8 24H5a1 1 0 0 1-1-1v-3"/><rect x="9" y="9" width="10" height="10" rx="2"/><path d="M13 13h2v2h-2z" fill="currentColor" stroke="none"/></svg>
                  </div>
                  <span class="text-[13px] font-medium" style="color: var(--foreground);">生产扫码</span>
                </button>

                <!-- 6. 菲号单价 — 吊牌标签 -->
                <button class="flex flex-col items-center gap-1.5 rounded-[8px] p-1 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="outline-color: var(--ring);">
                  <div class="w-14 h-14 rounded-[14px] flex items-center justify-center" style="background: rgba(255,45,85,0.1);">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #FF2D55;"><path d="M21 4H11L3 12l8 8h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3z"/><circle cx="8" cy="12" r="1.5"/><path d="M14 10v4M12 12h4M16 16l3 3"/></svg>
                  </div>
                  <span class="text-[13px] font-medium" style="color: var(--foreground);">菲号单价</span>
                </button>

                <!-- 7. 裁剪任务 — 剪刀 -->
                <button class="flex flex-col items-center gap-1.5 rounded-[8px] p-1 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="outline-color: var(--ring);">
                  <div class="w-14 h-14 rounded-[14px] flex items-center justify-center" style="background: rgba(255,59,48,0.1);">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #FF3B30;"><circle cx="7" cy="8" r="3"/><circle cx="7" cy="20" r="3"/><path d="M9.5 10L24 20M9.5 18L24 8"/><path d="M14 14l5-3.5"/></svg>
                  </div>
                  <span class="text-[13px] font-medium" style="color: var(--foreground);">裁剪任务</span>
                </button>

                <!-- 8. 扫码历史 — 时钟+旋转箭头 -->
                <button class="flex flex-col items-center gap-1.5 rounded-[8px] p-1 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="outline-color: var(--ring);">
                  <div class="w-14 h-14 rounded-[14px] flex items-center justify-center" style="background: rgba(175,82,222,0.1);">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #AF52DE;"><path d="M23 14a9 9 0 1 1-3-6.7"/><path d="M23 4v4h-4"/><path d="M14 10v4l3 2"/></svg>
                  </div>
                  <span class="text-[13px] font-medium" style="color: var(--foreground);">扫码历史</span>
                </button>

                <!-- 9. 工厂看板 — 厂房 -->
                <button class="flex flex-col items-center gap-1.5 rounded-[8px] p-1 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="outline-color: var(--ring);">
                  <div class="w-14 h-14 rounded-[14px] flex items-center justify-center" style="background: rgba(48,209,88,0.1);">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: #30D158;"><path d="M3 24V14l5 3V14l5 3V10l5 3V8l4 2v14z"/><rect x="7" y="20" width="2.5" height="2.5"/><rect x="12" y="20" width="2.5" height="2.5"/><rect x="17" y="20" width="2.5" height="2.5"/><path d="M3 24h22"/></svg>
                  </div>
                  <span class="text-[13px] font-medium" style="color: var(--foreground);">工厂看板</span>
                </button>

              </div>
            </div>
          </div>

          <!-- AI assistant entry card -->
          <button class="w-full rounded-[14px] border p-4 flex items-center gap-3 transition-colors duration-200 hover:bg-[var(--accent)] active:bg-[var(--accent)] motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="background: var(--card); border-color: var(--border); outline-color: var(--ring);">
            <div class="w-10 h-10 rounded-[10px] flex items-center justify-center shrink-0" style="background: var(--accent);">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary);"><path d="M10 2l1.5 5L17 8l-5.5 1L10 14l-1.5-5L3 8l5.5-1L10 2z"/><path d="M15 13l.8 2.2L18 16l-2.2.8L15 19l-.8-2.2L12 16l2.2-.8L15 13z"/></svg>
            </div>
            <div class="flex-1 text-left min-w-0">
              <div class="text-[16px] font-semibold" style="color: var(--foreground);">小云助手</div>
              <div class="text-[13px] mt-0.5" style="color: var(--muted-foreground);">3 条未读提醒</div>
            </div>
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="shrink-0" style="color: var(--muted-foreground);"><path d="M7 5l5 5-5 5"/></svg>
          </button>

        </div>

        <!-- Bottom tab bar (49px tab + 34px safe area = 83px) -->
        <div class="fixed bottom-0 inset-x-0 border-t" style="background: rgba(255,255,255,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-color: var(--border);">
          <div class="flex items-center justify-around h-[49px]">
            <!-- 首页 (active) -->
            <div class="flex flex-col items-center gap-0.5" style="color: var(--primary);">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11l8-7 8 7v8a1 1 0 0 1-1 1h-4v-6h-6v6H5a1 1 0 0 1-1-1v-8z"/></svg>
              <span class="text-[11px] font-medium">首页</span>
            </div>
            <!-- 生产 -->
            <button data-dom-id="nav-dashboard" class="flex flex-col items-center gap-0.5 transition-colors duration-200 hover:opacity-70 motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="color: var(--muted-foreground); outline-color: var(--ring);">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4v2a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1V4"/><path d="M9 12h6M9 16h4"/></svg>
              <span class="text-[11px] font-medium">生产</span>
            </button>
            <!-- 扫码 -->
            <button data-dom-id="nav-scan" class="flex flex-col items-center gap-0.5 transition-colors duration-200 hover:opacity-70 motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="color: var(--muted-foreground); outline-color: var(--ring);">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V5a1 1 0 0 1 1-1h2M17 4h2a1 1 0 0 1 1 1v2M20 17v2a1 1 0 0 1-1 1h-2M7 20H5a1 1 0 0 1-1-1v-2"/><rect x="8" y="8" width="8" height="8" rx="1"/><path d="M11 11h2v2h-2z" fill="currentColor" stroke="none"/></svg>
              <span class="text-[11px] font-medium">扫码</span>
            </button>
            <!-- 我的 -->
            <button class="flex flex-col items-center gap-0.5 transition-colors duration-200 hover:opacity-70 motion-reduce:transition-none focus-visible:outline-2 focus-visible:outline-offset-2" style="color: var(--muted-foreground); outline-color: var(--ring);">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
              <span class="text-[11px] font-medium">我的</span>
            </button>
          </div>
          <div style="height: env(safe-area-inset-bottom, 34px);"></div>
        </div>

      </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
