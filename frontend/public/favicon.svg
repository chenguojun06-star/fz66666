<!-- 小云 favicon — 1:1 蓝底，精确还原 XiaoyunCloudAvatar.module.css 几何结构 -->
<!--
  坐标体系（64×64 viewport）：
  Stage = 64×64；Cloud 容器 = 88%×72% = 56.3×46.1，起点 (4, 9)
  部件百分比均基于 cloud 容器 (56.3w × 46.1h)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img">
  <title>小云</title>
  <defs>
    <!-- 云朵渐变：顶部纯白 → 底部淡蓝，对应 CSS gradient(#fff → #dce9ff) -->
    <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dce9ff"/>
    </linearGradient>
  </defs>

  <!-- ① 蓝色圆角方背景 -->
  <rect width="64" height="64" rx="13" fill="#1677ff"/>

  <!-- ② 云朵凸包（partLeft / partRight 先画，partCenter 最后覆盖在上层） -->
  <!-- partLeft: 30%×40% at left 12% top 34% → ellipse cx=19.2 cy=33.9 rx=8.5 ry=9.2 -->
  <ellipse cx="19.2" cy="33.9" rx="8.5" ry="9.2" fill="url(#cg)"/>
  <!-- partRight: 28%×36% at right 12% top 38% → ellipse cx=45.7 cy=34.8 rx=7.9 ry=8.3 -->
  <ellipse cx="45.7" cy="34.8" rx="7.9" ry="8.3" fill="url(#cg)"/>
  <!-- partCenter: 38%×52% at left 31% top 16% → ellipse cx=32.2 cy=28.4 rx=10.7 ry=12.0 -->
  <ellipse cx="32.2" cy="28.4" rx="10.7" ry="12.0" fill="url(#cg)"/>

  <!-- ③ 云朵底座（base: left 13% right 13% bottom 12% height 30% border-radius:999px） -->
  <!-- 对应: x=11.3 y=35.7 width=41.7 height=13.8 rx=7 -->
  <rect x="11.3" y="35.7" width="41.7" height="13.8" rx="7" fill="url(#cg)"/>

  <!-- ④ 眼睛（#3f5d95，top 43% / 12%w 18%h / left|right 31%） -->
  <!-- eyeLeft: cx=24.8 cy=33.0 rx=3.4 ry=4.2 -->
  <ellipse cx="24.8" cy="33.0" rx="3.4" ry="4.2" fill="#3f5d95"/>
  <!-- eyeRight: cx=39.5 cy=33.0 rx=3.4 ry=4.2 -->
  <ellipse cx="39.5" cy="33.0" rx="3.4" ry="4.2" fill="#3f5d95"/>

  <!-- ⑤ 眼睛高光（44%w 36%h top 12% left 14% of eye → white circle） -->
  <circle cx="23.9" cy="31.3" r="1.5" fill="white" opacity="0.96"/>
  <circle cx="38.5" cy="31.3" r="1.5" fill="white" opacity="0.96"/>

  <!-- ⑥ 微笑（26%w bottom 24%，border-radius:0 0 999px 999px → 三次贝塞尔 U 弧） -->
  <!-- 三次贝塞尔：C 控制点同时下拉到 y=46，弧底中点约 y=43.9，实际下沉 ~6px，呈现明显月牙笑弧 -->
  <path d="M 25.5 37.5 C 25.5 46.0 38.5 46.0 38.5 37.5"
        fill="none" stroke="#597ac0" stroke-width="3" stroke-linecap="round"/>
</svg>
