<!-- 小云 mascot favicon — cute cloud face — crisp at 16×16px -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title-xiaoyu">
  <title id="title-xiaoyu">小云</title>
  <defs>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4aa3ff"/>
      <stop offset="100%" stop-color="#1677ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1677ff" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 蓝色外圆背景 -->
  <circle cx="32" cy="32" r="32" fill="#1677ff"/>

  <!-- 云朵轮廓 -->
  <rect x="10" y="36" width="44" height="18" rx="9" fill="url(#cloudGrad)" filter="url(#glow)"/>
  <circle cx="18" cy="34" r="9"  fill="url(#cloudGrad)"/>
  <circle cx="46" cy="32" r="10" fill="url(#cloudGrad)"/>
  <circle cx="32" cy="28" r="13" fill="url(#cloudGrad)"/>

  <!-- 眼睛 -->
  <circle cx="26" cy="32" r="3" fill="#ffffff"/>
  <circle cx="38" cy="32" r="3" fill="#ffffff"/>
  <circle cx="27" cy="33" r="1.4" fill="#0050c0"/>
  <circle cx="39" cy="33" r="1.4" fill="#0050c0"/>
  <!-- 笑容 -->
  <path d="M26 40 Q32 46 38 40" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- 头顶天线 -->
  <line x1="32" y1="15" x2="32" y2="9" stroke="#4aa3ff" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="7" r="3" fill="#1677ff"/>
</svg>
