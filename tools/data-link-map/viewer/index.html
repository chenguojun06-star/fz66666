<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>服装供应链 - 数据链路神经网络地图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    background: #0a0e1a;
    color: #e0e6ed;
    overflow: hidden;
    height: 100vh;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  /* 顶部工具栏 */
  #toolbar {
    background: linear-gradient(90deg, #1a1f2e 0%, #0d1117 100%);
    padding: 12px 20px;
    border-bottom: 1px solid #2a3142;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #toolbar h1 {
    font-size: 16px;
    background: linear-gradient(90deg, #4fc3f7, #ab47bc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 600;
  }
  #toolbar .stats {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: #8b949e;
  }
  #toolbar .stats span { display: flex; align-items: center; gap: 4px; }
  #toolbar .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-green { background: #7dc88a; box-shadow: 0 0 8px rgba(125, 200, 138, 0.5); }
  .dot-yellow { background: #e8c870; box-shadow: 0 0 8px rgba(232, 200, 112, 0.5); }
  .dot-red { background: #ff3b30; box-shadow: 0 0 12px rgba(255, 59, 48, 0.8); }
  .dot-gray { background: #6e7681; }
  #toolbar .spacer { flex: 1; }
  #toolbar button {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }
  #toolbar button:hover { background: #30363d; border-color: #8b949e; }
  #toolbar button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

  /* 链路过滤器 */
  #chainFilter { display: flex; gap: 4px; }
  #chainFilter button { padding: 4px 10px; font-size: 11px; }

  /* 主体布局 */
  #main { display: flex; flex: 1; overflow: hidden; }
  #canvas-container { flex: 1; position: relative; overflow: hidden; }
  #canvas { width: 100%; height: 100%; display: block; }

  /* 右侧详情面板 */
  #sidebar {
    width: 360px;
    background: #0d1117;
    border-left: 1px solid #2a3142;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #sidebar .panel {
    padding: 16px;
    border-bottom: 1px solid #2a3142;
  }
  #sidebar .panel h3 {
    font-size: 13px;
    color: #58a6ff;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #sidebar .panel .row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 12px;
    border-bottom: 1px solid #161b22;
  }
  #sidebar .panel .row:last-child { border-bottom: none; }
  #sidebar .panel .row .key { color: #8b949e; }
  #sidebar .panel .row .val { color: #c9d1d9; text-align: right; word-break: break-all; }
  #sidebar .node-detail { padding: 16px; }
  #sidebar .node-detail h2 {
    font-size: 15px;
    color: #f0f6fc;
    margin-bottom: 4px;
  }
  #sidebar .node-detail .subtitle {
    font-size: 11px;
    color: #8b949e;
    margin-bottom: 12px;
  }
  #sidebar .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    margin-right: 4px;
  }
  .badge-entity { background: #1f3a5f; color: #58a6ff; }
  .badge-endpoint { background: #1f3a2f; color: #3fb950; }
  .badge-external { background: #3a1f3f; color: #bc8cff; }
  .badge-frontend { background: #3f2f1f; color: #f0883e; }
  .badge-chain-A { background: #1f2a4f; color: #58a6ff; }
  .badge-chain-B { background: #1f4f3a; color: #3fb950; }
  .badge-chain-C { background: #4f2a1f; color: #f0883e; }
  .badge-chain-D { background: #3a1f4f; color: #bc8cff; }

  /* 探测结果列表 */
  #probeList { max-height: 400px; overflow-y: auto; }
  #probeList .probe-item {
    padding: 8px 16px;
    border-bottom: 1px solid #161b22;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #probeList .probe-item .path { flex: 1; color: #c9d1d9; word-break: break-all; }
  #probeList .probe-item .error { color: #f85149; font-size: 11px; }
  #probeList .probe-item .elapsed { color: #8b949e; font-size: 11px; }

  /* 图例 */
  #legend {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: rgba(13, 17, 23, 0.9);
    border: 1px solid #2a3142;
    border-radius: 8px;
    padding: 12px;
    font-size: 11px;
    backdrop-filter: blur(8px);
    z-index: 10;
  }
  #legend .title { color: #58a6ff; margin-bottom: 8px; font-weight: 600; }
  #legend .item { display: flex; align-items: center; gap: 6px; margin: 3px 0; color: #8b949e; }
  #legend .swatch { width: 12px; height: 12px; border-radius: 3px; }

  /* 加载提示 */
  #loading {
    position: fixed;
    inset: 0;
    background: rgba(10, 14, 26, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    color: #58a6ff;
    font-size: 14px;
  }
  #loading .spinner {
    width: 32px; height: 32px;
    border: 3px solid #2a3142;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span>加载地图数据...</span></div>
<div id="app">
  <div id="toolbar">
    <h1>🧬 数据链路神经网络地图</h1>
    <div class="stats" id="stats"></div>
    <div class="spacer"></div>
    <div id="chainFilter">
      <button class="active" data-chain="ALL">全部</button>
      <button data-chain="A">A 款式开发</button>
      <button data-chain="B">B 扫码入库</button>
      <button data-chain="C">C 工资结算</button>
      <button data-chain="D">D 多端对接</button>
    </div>
    <button id="btnProbe">🔍 实时探测</button>
    <button id="btnIssues">⚠️ 问题列表 <span id="issueCount" style="display:none;background:#ff3b30;color:#fff;padding:0 6px;border-radius:10px;font-size:10px;margin-left:4px"></span></button>
    <button id="btnFreeze">❄️ 冻结布局</button>
    <button id="btnOverview">🗺️ 返回总览</button>
    <button id="btnRefresh">🔄 重新加载</button>
    <span id="lodIndicator" style="color:#58a6ff;font-size:12px;padding:4px 10px;border:1px solid #2a3142;border-radius:4px;background:#0d1117">LOD: 模块级</span>
  </div>
  <div id="main">
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
      <div id="legend">
        <div class="title">模块色图例</div>
        <div class="item"><div class="swatch" style="background:#e891c7"></div>款式开发</div>
        <div class="item"><div class="swatch" style="background:#e8a572"></div>生产扫码</div>
        <div class="item"><div class="swatch" style="background:#e8c870"></div>财务工资</div>
        <div class="item"><div class="swatch" style="background:#7dc88a"></div>仓库入库</div>
        <div class="item"><div class="swatch" style="background:#a999e8"></div>AI智能</div>
        <div class="item"><div class="swatch" style="background:#e88a8a"></div>外部对接</div>
        <div class="item"><div class="swatch" style="background:#7dafe8"></div>PC前端</div>
        <div class="item"><div class="swatch" style="background:#6bc4b8"></div>小程序</div>
        <div class="item"><div class="swatch" style="background:#9a85e0"></div>H5前端</div>
        <div class="title" style="margin-top:10px">状态图例</div>
        <div class="item"><div class="dot dot-red" style="display:inline-block;width:12px;height:12px;border-radius:50%"></div>断链/404/500（大红）</div>
        <div class="item"><div class="dot dot-yellow" style="display:inline-block;width:10px;height:10px;border-radius:50%"></div>告警</div>
        <div class="item"><div class="dot dot-green" style="display:inline-block;width:10px;height:10px;border-radius:50%"></div>正常</div>
      </div>
    </div>
    <div id="sidebar">
      <div class="panel" id="overviewPanel">
        <h3>系统概览</h3>
        <div class="row"><span class="key">节点总数</span><span class="val" id="totalNodes">-</span></div>
        <div class="row"><span class="key">实体 Entity</span><span class="val" id="entityCount">-</span></div>
        <div class="row"><span class="key">接口 Endpoint</span><span class="val" id="endpointCount">-</span></div>
        <div class="row"><span class="key">数据流转边</span><span class="val" id="edgeCount">-</span></div>
        <div class="row"><span class="key">最后扫描</span><span class="val" id="lastScan">-</span></div>
      </div>
      <div class="panel">
        <h3>🔴 实时探测结果</h3>
        <div class="row"><span class="key">探测时间</span><span class="val" id="probeTime">未探测</span></div>
        <div class="row"><span class="key">正常 / 告警 / 断链</span><span class="val" id="probeSummary">-</span></div>
        <div id="probeList"></div>
      </div>
      <div class="node-detail" id="issuePanel" style="display:none">
        <h3 style="margin-bottom:12px;color:#ff3b30">⚠️ 问题列表 <button id="btnCloseIssues" style="float:right;background:none;border:none;color:#8b949e;font-size:18px;cursor:pointer">×</button></h3>
        <div id="issueListContent"></div>
      </div>
      <div class="node-detail" id="nodeDetail" style="display:none">
        <h3 style="margin-bottom:12px">节点详情</h2>
        <div id="nodeDetailContent"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// 数据加载
// ──────────────────────────────────────────────
const BASE_DATA_DIR = '/data';
let mapData = null;
let probeData = null;
let nodes = [];
let edges = [];
let nodeMap = new Map();
let probeMap = new Map();
let selectedNode = null;
let hoverNode = null;
let activeChain = 'ALL';

async function loadData() {
  try {
    const mapResp = await fetch(`${BASE_DATA_DIR}/map.json?t=${Date.now()}`);
    mapData = await mapResp.json();
    nodes = mapData.nodes || [];
    edges = mapData.edges || [];
    nodeMap.clear();
    nodes.forEach(n => nodeMap.set(n.id, n));

    // 尝试加载探测结果（可能不存在）
    try {
      const probeResp = await fetch(`${BASE_DATA_DIR}/probe-result.json?t=${Date.now()}`);
      probeData = await probeResp.json();
      probeMap.clear();
      (probeData.results || []).forEach(r => probeMap.set(r.id, r));
    } catch (e) {
      console.log('无探测结果，使用静态分析');
    }

    renderStats();
    renderProbePanel();
    initLayout();
    document.getElementById('loading').style.display = 'none';
  } catch (e) {
    document.getElementById('loading').innerHTML = `<span style="color:#f85149">加载失败: ${e.message}<br>请先运行 python3 scanner/scan_static.py</span>`;
  }
}

// ──────────────────────────────────────────────
// 统计面板
// ──────────────────────────────────────────────
function renderStats() {
  const entityCount = nodes.filter(n => n.type === 'entity').length;
  const endpointCount = nodes.filter(n => n.type === 'endpoint').length;
  const externalCount = nodes.filter(n => n.type === 'external').length;
  const frontendCount = nodes.filter(n => n.type === 'frontend').length;

  document.getElementById('totalNodes').textContent = nodes.length;
  document.getElementById('entityCount').textContent = entityCount;
  document.getElementById('endpointCount').textContent = endpointCount;
  document.getElementById('edgeCount').textContent = edges.length;
  document.getElementById('lastScan').textContent = mapData.generated_at?.substring(0, 19) || '-';

  // 顶部统计
  const probeSummary = probeData?.summary;
  const statsHtml = `
    <span><div class="dot dot-gray"></div>${nodes.length} 节点</span>
    <span><div class="dot dot-gray"></div>${edges.length} 边</span>
    ${probeSummary ? `
      <span><div class="dot dot-green"></div>${probeSummary.green} 正常</span>
      <span><div class="dot dot-yellow"></div>${probeSummary.yellow} 告警</span>
      <span><div class="dot dot-red"></div>${probeSummary.red} 断链</span>
    ` : '<span><div class="dot dot-gray"></div>未探测</span>'}
  `;
  document.getElementById('stats').innerHTML = statsHtml;

  // 更新问题列表按钮的计数
  const redCount = probeSummary?.red || 0;
  const yellowCount = probeSummary?.yellow || 0;
  const knownIssueCount = nodes.filter(n => n.knownIssue).length;
  const totalIssues = redCount + yellowCount + knownIssueCount;
  const issueCountEl = document.getElementById('issueCount');
  if (totalIssues > 0) {
    issueCountEl.textContent = totalIssues;
    issueCountEl.style.display = 'inline-block';
    issueCountEl.style.background = redCount > 0 ? '#ff3b30' : '#e8c870';
  } else {
    issueCountEl.style.display = 'none';
  }
}

// ──────────────────────────────────────────────
// 探测结果面板
// ──────────────────────────────────────────────
function renderProbePanel() {
  if (!probeData) {
    document.getElementById('probeTime').textContent = '未探测';
    document.getElementById('probeSummary').textContent = '-';
    document.getElementById('probeList').innerHTML = '<div style="padding:8px 0;color:#8b949e;font-size:12px">点击右上角「实时探测」</div>';
    return;
  }
  document.getElementById('probeTime').textContent = probeData.probed_at?.substring(0, 19) || '-';
  const s = probeData.summary;
  document.getElementById('probeSummary').innerHTML = `<span style="color:#3fb950">${s.green}</span> / <span style="color:#d29922">${s.yellow}</span> / <span style="color:#f85149">${s.red}</span>`;

  const list = document.getElementById('probeList');
  list.innerHTML = probeData.results.map(r => {
    const icon = { green: '🟢', yellow: '🟡', red: '🔴' }[r.status];
    return `
      <div class="probe-item">
        <span>${icon}</span>
        <span class="path">${r.path}</span>
        <span class="elapsed">${r.elapsedMs}ms</span>
        ${r.error ? `<div class="error" style="width:100%">${r.error}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ──────────────────────────────────────────────
// Canvas 渲染（力导向布局）
// ──────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let width = 0, height = 0;
let camera = { x: 0, y: 0, zoom: 0.45 };
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let mousePos = { x: 0, y: 0 };

function resizeCanvas() {
  const container = document.getElementById('canvas-container');
  width = container.clientWidth;
  height = container.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.scale(dpr, dpr);
}

// 按模块分组的中心点
const MODULE_CENTERS = {
  style:         { x: -400, y: -200 },
  production:    { x: 0,    y: -200 },
  finance:       { x: 400,  y: -200 },
  warehouse:     { x: -400, y: 100 },
  intelligence:  { x: 0,    y: 100 },
  integration:   { x: 400,  y: 100 },
  frontend:      { x: 0,    y: 350 },
  miniprogram:   { x: -300, y: 350 },
  h5:            { x: 300,  y: 350 },
  unknown:       { x: 0,    y: 0 }
};

let layoutNodes = [];
let layoutEdges = [];
let moduleAgg = {};  // 模块聚合数据
let moduleEdges = [];  // 模块级边（聚合后）
let layoutFrozen = false;  // 布局是否冻结（稳定后停止迭代）
let layoutTemperature = 1.0;  // 模拟温度，逐帧衰减

function initLayout() {
  // 重置冻结状态和温度
  layoutFrozen = false;
  layoutTemperature = 1.0;

  // 过滤可见节点
  const visibleNodes = nodes.filter(n => {
    if (activeChain === 'ALL') return true;
    return (n.chain || []).includes(activeChain);
  });
  const visibleIds = new Set(visibleNodes.map(n => n.id));

  // 初始化节点位置（按模块分组，环形布局避免重叠）
  const moduleNodeList = {};  // 按模块分组
  visibleNodes.forEach(n => {
    const m = n.module || 'unknown';
    if (!moduleNodeList[m]) moduleNodeList[m] = [];
    moduleNodeList[m].push(n);
    if (!n.x || !n.y) {
      const center = MODULE_CENTERS[m] || MODULE_CENTERS.unknown;
      n.x = center.x + (Math.random() - 0.5) * 200;
      n.y = center.y + (Math.random() - 0.5) * 200;
      n.vx = 0;
      n.vy = 0;
    }
  });

  // 模块内环形布局（避免重叠）
  Object.entries(moduleNodeList).forEach(([mod, nodeList]) => {
    if (nodeList.length === 0) return;
    const center = MODULE_CENTERS[mod] || MODULE_CENTERS.unknown;
    const radius = Math.max(120, Math.sqrt(nodeList.length) * 28);
    nodeList.forEach((n, i) => {
      if (n._initialized) return;
      const angle = (i / nodeList.length) * Math.PI * 2;
      n.x = center.x + Math.cos(angle) * radius + (Math.random() - 0.5) * 20;
      n.y = center.y + Math.sin(angle) * radius + (Math.random() - 0.5) * 20;
      n._initialized = true;
    });
  });

  layoutNodes = visibleNodes;
  layoutEdges = edges.filter(e => visibleIds.has(e.from) && visibleIds.has(e.to));

  // 计算模块级聚合（用于缩小视图）
  moduleAgg = {};
  layoutNodes.forEach(n => {
    const m = n.module || 'unknown';
    if (!moduleAgg[m]) moduleAgg[m] = { module: m, count: 0, nodes: [], hasRed: false, hasYellow: false };
    moduleAgg[m].count++;
    moduleAgg[m].nodes.push(n);
    const ps = getProbeStatus(n.id);
    if (ps === 'red') moduleAgg[m].hasRed = true;
    if (ps === 'yellow') moduleAgg[m].hasYellow = true;
  });

  // 计算模块级边（聚合跨模块关联）
  const meMap = {};
  layoutEdges.forEach(e => {
    const a = nodeMap.get(e.from);
    const b = nodeMap.get(e.to);
    if (!a || !b) return;
    const ma = a.module || 'unknown';
    const mb = b.module || 'unknown';
    if (ma === mb) return;  // 同模块不画模块级边
    const key = ma < mb ? `${ma}|${mb}` : `${mb}|${ma}`;
    if (!meMap[key]) meMap[key] = { from: ma, to: mb, count: 0, labels: new Set() };
    meMap[key].count++;
    if (e.label) meMap[key].labels.add(e.label);
  });
  moduleEdges = Object.values(meMap);
}

function simulate() {
  if (layoutFrozen) return;  // 冻结后不再迭代
  // 节点级力导向（仅在中高缩放时活跃）
  if (camera.zoom > 0.6) {
    for (let i = 0; i < layoutNodes.length; i++) {
      for (let j = i + 1; j < layoutNodes.length; j++) {
        const a = layoutNodes[i];
        const b = layoutNodes[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const distSq = dx * dx + dy * dy;
        if (distSq > 40000) continue;  // 超过200距离不计算斥力（性能优化）
        const dist = Math.sqrt(distSq) || 1;
        const force = 1200 / (distSq);
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        a.vx -= fx;
        a.vy -= fy;
        b.vx += fx;
        b.vy += fy;
      }
    }

    // 边引力（仅同模块内）
    layoutEdges.forEach(e => {
      const a = nodeMap.get(e.from);
      const b = nodeMap.get(e.to);
      if (!a || !b) return;
      if (a.module !== b.module) return;  // 跨模块不拉近距离
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      if (dist < 60) return;  // 太近不吸引
      const force = (dist - 100) * 0.015;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      a.vx += fx;
      a.vy += fy;
      b.vx -= fx;
      b.vy -= fy;
    });

    // 模块中心引力
    layoutNodes.forEach(n => {
      const center = MODULE_CENTERS[n.module] || MODULE_CENTERS.unknown;
      n.vx += (center.x - n.x) * 0.008;
      n.vy += (center.y - n.y) * 0.008;
    });

    // 阻尼 + 位置更新（乘以温度）
    let maxVel = 0;
    layoutNodes.forEach(n => {
      n.vx *= 0.82 * layoutTemperature;
      n.vy *= 0.82 * layoutTemperature;
      n.x += n.vx;
      n.y += n.vy;
      const v = Math.abs(n.vx) + Math.abs(n.vy);
      if (v > maxVel) maxVel = v;
    });

    // 温度衰减（每帧降 1%）
    layoutTemperature *= 0.99;
    // 速度过低时冻结
    if (layoutTemperature < 0.05 || maxVel < 0.1) {
      layoutFrozen = true;
      layoutNodes.forEach(n => { n.vx = 0; n.vy = 0; });
    }
  }
}

function getProbeStatus(nodeId) {
  const probe = probeMap.get(nodeId);
  if (probe) return probe.status;
  // 有 knownIssue 的标黄
  const node = nodeMap.get(nodeId);
  if (node?.knownIssue) return 'yellow';
  return 'gray';
}

function getNodeColor(node) {
  // 优先按模块色着色（一眼看清节点属于哪个模块）
  if (node.module && MODULE_COLORS[node.module]) {
    return MODULE_COLORS[node.module].main;
  }
  // 兜底按类型着色
  const typeColors = {
    entity: '#58a6ff',
    endpoint: '#3fb950',
    external: '#bc8cff',
    frontend: '#f0883e'
  };
  return typeColors[node.type] || '#8b949e';
}

function getNodeRadius(node) {
  const typeRadius = {
    entity: 8,
    endpoint: 6,
    external: 10,
    frontend: 10
  };
  let r = typeRadius[node.type] || 6;
  if (node === selectedNode) r += 4;
  if (node === hoverNode) r += 2;
  return r;
}

const MODULE_LABELS = {
  style: '款式开发',
  production: '生产扫码',
  finance: '财务工资',
  warehouse: '仓库入库',
  intelligence: 'AI智能',
  integration: '外部对接',
  frontend: 'PC前端',
  miniprogram: '小程序',
  h5: 'H5前端',
  unknown: '其他'
};

// 每个模块独特配色（柔和舒适色调，主色 + 浅色 + 深色）
const MODULE_COLORS = {
  style:        { main: '#e891c7', light: '#f5b8db', dark: '#b56ba0', name: '粉色' },     // 柔粉 - 款式
  production:   { main: '#e8a572', light: '#f5c195', dark: '#b5784f', name: '橙色' },     // 暖橙 - 生产
  finance:      { main: '#e8c870', light: '#f0db95', dark: '#b5994f', name: '金色' },     // 柔金 - 财务
  warehouse:    { main: '#7dc88a', light: '#a3dcae', dark: '#5ba068', name: '绿色' },     // 薄荷 - 仓库
  intelligence: { main: '#a999e8', light: '#c2b5f0', dark: '#7e6bb5', name: '紫色' },     // 淡紫 - AI
  integration:  { main: '#e88a8a', light: '#f5abab', dark: '#b56b6b', name: '红色' },     // 柔红 - 外部对接
  frontend:     { main: '#7dafe8', light: '#a3c8f0', dark: '#5b88b5', name: '蓝色' },     // 天蓝 - PC前端
  miniprogram:  { main: '#6bc4b8', light: '#92d6cd', dark: '#4a9c8f', name: '青色' },     // 柔青 - 小程序
  h5:           { main: '#9a85e0', light: '#b8a8ea', dark: '#7360b3', name: '紫蓝' },     // 柔紫蓝 - H5
  unknown:      { main: '#a8b1bb', light: '#c2c9d0', dark: '#7e8a95', name: '灰色' }      // 柔灰 - 其他
};

function getModuleColor(mod) {
  return MODULE_COLORS[mod] || MODULE_COLORS.unknown;
}

function render() {
  ctx.clearRect(0, 0, width, height);
  ctx.save();
  ctx.translate(width / 2 + camera.x, height / 2 + camera.y);
  ctx.scale(camera.zoom, camera.zoom);

  const zoom = camera.zoom;

  if (zoom < 0.6) {
    // ── LOD Level 1: 模块级聚合视图（缩小看全局） ──
    renderModuleView();
  } else if (zoom < 1.2) {
    // ── LOD Level 2: 实体+外部节点视图（中等缩放） ──
    renderEntityView();
  } else {
    // ── LOD Level 3: 全部节点视图（放大） ──
    renderFullView();
  }

  ctx.restore();
}

// LOD Level 1: 模块级聚合视图
function renderModuleView() {
  // 模块级边（粗线表示跨模块关联，线越粗关联越多，颜色取两端模块的混合色）
  moduleEdges.forEach(me => {
    const a = MODULE_CENTERS[me.from];
    const b = MODULE_CENTERS[me.to];
    if (!a || !b) return;
    const width = Math.min(8, Math.max(1.5, Math.log2(me.count + 1) * 1.5));
    const hasHighlight = selectedNode && (
      (selectedNode.module === me.from) || (selectedNode.module === me.to)
    );
    // 混合两端模块颜色
    const colorA = getModuleColor(me.from);
    const colorB = getModuleColor(me.to);
    const midColor = mixHex(colorA.main, colorB.main);
    if (hasHighlight) {
      ctx.strokeStyle = midColor;
      ctx.globalAlpha = 0.95;
    } else {
      ctx.strokeStyle = midColor;
      ctx.globalAlpha = 0.5;
    }
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    ctx.globalAlpha = 1.0;

    // 边中点显示关联数
    if (hasHighlight || me.count >= 5) {
      const midX = (a.x + b.x) / 2;
      const midY = (a.y + b.y) / 2;
      ctx.fillStyle = 'rgba(13, 17, 23, 0.85)';
      ctx.beginPath();
      ctx.arc(midX, midY, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = midColor;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(me.count, midX, midY);
    }
  });

  // 模块节点（大圆盘，每个模块独有颜色）
  Object.entries(moduleAgg).forEach(([mod, agg]) => {
    const center = MODULE_CENTERS[mod] || MODULE_CENTERS.unknown;
    const r = Math.max(32, Math.sqrt(agg.count) * 8);
    const color = getModuleColor(mod);
    const isHighlighted = selectedNode && selectedNode.module === mod;

    // 告警光晕（出问题才用最红的大红，告警用明亮琥珀）
    if (agg.hasRed) {
      ctx.fillStyle = 'rgba(255, 59, 48, 0.4)';
      ctx.beginPath();
      ctx.arc(center.x, center.y, r + 22, 0, Math.PI * 2);
      ctx.fill();
      // 再加一层更亮的内光晕
      ctx.fillStyle = 'rgba(255, 80, 70, 0.3)';
      ctx.beginPath();
      ctx.arc(center.x, center.y, r + 12, 0, Math.PI * 2);
      ctx.fill();
    } else if (agg.hasYellow) {
      ctx.fillStyle = 'rgba(255, 200, 80, 0.35)';
      ctx.beginPath();
      ctx.arc(center.x, center.y, r + 16, 0, Math.PI * 2);
      ctx.fill();
    }

    // 模块圆盘（径向渐变，用模块主色）
    const grad = ctx.createRadialGradient(center.x, center.y - r * 0.3, 0, center.x, center.y, r);
    if (agg.hasRed) {
      // 出问题：用最红的大红（强对比，一眼定位）
      grad.addColorStop(0, 'rgba(255, 90, 80, 1.0)');
      grad.addColorStop(0.6, 'rgba(255, 59, 48, 0.95)');
      grad.addColorStop(1, 'rgba(180, 20, 15, 0.7)');
    } else if (agg.hasYellow) {
      // 告警：明亮琥珀
      grad.addColorStop(0, 'rgba(255, 215, 100, 0.98)');
      grad.addColorStop(1, 'rgba(200, 150, 40, 0.6)');
    } else {
      // 正常：模块自身柔和色
      grad.addColorStop(0, hexToRgba(color.light, 0.95));
      grad.addColorStop(0.7, hexToRgba(color.main, 0.85));
      grad.addColorStop(1, hexToRgba(color.dark, 0.5));
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(center.x, center.y, r, 0, Math.PI * 2);
    ctx.fill();

    // 描边（高亮时白色加粗，告警时加红边）
    if (agg.hasRed) {
      ctx.strokeStyle = '#ff3b30';
      ctx.lineWidth = isHighlighted ? 3.5 : 2.5;
      // 闪烁效果（通过双描边模拟）
      ctx.stroke();
    } else {
      ctx.strokeStyle = isHighlighted ? '#fff' : hexToRgba(color.dark, 0.8);
      ctx.lineWidth = isHighlighted ? 3 : 1.5;
      ctx.stroke();
    }

    // 内部高光（让圆盘有立体感）
    const highlightGrad = ctx.createRadialGradient(center.x - r * 0.3, center.y - r * 0.4, 0, center.x - r * 0.3, center.y - r * 0.4, r * 0.5);
    highlightGrad.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
    highlightGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = highlightGrad;
    ctx.beginPath();
    ctx.arc(center.x, center.y, r, 0, Math.PI * 2);
    ctx.fill();

    // 模块标签
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 3;
    ctx.fillText(MODULE_LABELS[mod] || mod, center.x, center.y - 8);
    ctx.font = '10px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillText(`${agg.count} 节点`, center.x, center.y + 8);
    ctx.shadowBlur = 0;
  });
}

// 颜色工具：hex 转 rgba
function hexToRgba(hex, alpha) {
  const h = hex.replace('#', '');
  const r = parseInt(h.substring(0, 2), 16);
  const g = parseInt(h.substring(2, 4), 16);
  const b = parseInt(h.substring(4, 6), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

// 颜色工具：混合两个 hex 颜色
function mixHex(hex1, hex2) {
  const h1 = hex1.replace('#', '');
  const h2 = hex2.replace('#', '');
  const r = Math.round((parseInt(h1.substring(0, 2), 16) + parseInt(h2.substring(0, 2), 16)) / 2);
  const g = Math.round((parseInt(h1.substring(2, 4), 16) + parseInt(h2.substring(2, 4), 16)) / 2);
  const b = Math.round((parseInt(h1.substring(4, 6), 16) + parseInt(h2.substring(4, 6), 16)) / 2);
  return `rgb(${r}, ${g}, ${b})`;
}

// LOD Level 2: 实体节点视图
function renderEntityView() {
  const entityNodes = layoutNodes.filter(n => n.type === 'entity' || n.type === 'external' || n.type === 'frontend');
  const entityIds = new Set(entityNodes.map(n => n.id));

  // 跨模块边（实体级，只画选中相关的）
  layoutEdges.forEach(e => {
    if (!entityIds.has(e.from) || !entityIds.has(e.to)) return;
    const a = nodeMap.get(e.from);
    const b = nodeMap.get(e.to);
    if (!a || !b) return;
    const isHighlighted = (selectedNode && (selectedNode.id === a.id || selectedNode.id === b.id)) ||
                          (hoverNode && (hoverNode.id === a.id || hoverNode.id === b.id));
    if (!isHighlighted) return;  // 中等缩放只画高亮边
    ctx.strokeStyle = 'rgba(88, 166, 255, 0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    if (e.label) {
      const midX = (a.x + b.x) / 2;
      const midY = (a.y + b.y) / 2;
      ctx.fillStyle = '#58a6ff';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, midX, midY - 4);
    }
  });

  // 实体节点
  entityNodes.forEach(n => {
    drawNode(n);
  });
}

// LOD Level 3: 全部节点视图
function renderFullView() {
  // 边（只画选中/悬停相关 + 同模块内）
  layoutEdges.forEach(e => {
    const a = nodeMap.get(e.from);
    const b = nodeMap.get(e.to);
    if (!a || !b) return;
    const isHighlighted = (selectedNode && (selectedNode.id === a.id || selectedNode.id === b.id)) ||
                          (hoverNode && (hoverNode.id === a.id || hoverNode.id === b.id));
    if (!isHighlighted) return;  // 放大时也只画高亮边，避免混乱
    const isCrossModule = a.module !== b.module;
    // 检查是否关联断链节点
    const aRed = getProbeStatus(a.id) === 'red';
    const bRed = getProbeStatus(b.id) === 'red';
    const colorA = getModuleColor(a.module);
    if (aRed || bRed) {
      // 关联断链节点的边用最红的大红
      ctx.strokeStyle = 'rgba(255, 59, 48, 0.8)';
      ctx.lineWidth = 2;
    } else if (isCrossModule) {
      ctx.strokeStyle = 'rgba(168, 177, 187, 0.5)';
      ctx.lineWidth = 1;
    } else {
      ctx.strokeStyle = hexToRgba(colorA.main, 0.7);
      ctx.lineWidth = 1;
    }
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
    if (e.label) {
      const midX = (a.x + b.x) / 2;
      const midY = (a.y + b.y) / 2;
      ctx.fillStyle = isCrossModule ? '#e88a8a' : colorA.main;
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(e.label, midX, midY - 4);
    }
  });

  // 所有节点
  layoutNodes.forEach(n => {
    drawNode(n);
  });
}

// 绘制单个节点
function drawNode(n) {
  const r = getNodeRadius(n);
  const color = getNodeColor(n);
  const probeStatus = getProbeStatus(n.id);

  // 探测状态光晕（正常柔和，告警明亮，断链用最红的大红）
  if (probeStatus === 'red') {
    // 断链：最红的大红光晕（双层加亮）
    ctx.fillStyle = 'rgba(255, 59, 48, 0.45)';
    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 80, 70, 0.3)';
    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 6, 0, Math.PI * 2);
    ctx.fill();
  } else if (probeStatus === 'yellow') {
    // 告警：明亮琥珀
    ctx.fillStyle = 'rgba(255, 200, 80, 0.3)';
    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 8, 0, Math.PI * 2);
    ctx.fill();
  } else if (probeStatus === 'green') {
    // 正常：柔和薄荷
    ctx.fillStyle = 'rgba(125, 200, 138, 0.18)';
    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // 节点本体（断链时变红，其他用模块色）
  if (probeStatus === 'red') {
    ctx.fillStyle = '#ff3b30';
  } else {
    ctx.fillStyle = color;
  }
  ctx.beginPath();
  ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
  ctx.fill();

  // 选中/悬停描边
  if (n === selectedNode) {
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  } else if (n === hoverNode) {
    ctx.strokeStyle = '#c9d1d9';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else if (probeStatus === 'red') {
    // 断链节点加红色描边强化
    ctx.strokeStyle = '#ff3b30';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // 告警小点（断链用最红的大红，加白边突出）
  if (probeStatus === 'red') {
    ctx.fillStyle = '#ff3b30';
    ctx.beginPath();
    ctx.arc(n.x + r * 0.7, n.y - r * 0.7, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  // 节点标签（断链节点标签红色加粗，其他正常）
  if (n === selectedNode || n === hoverNode || camera.zoom > 1.8) {
    if (probeStatus === 'red') {
      ctx.fillStyle = '#ff3b30';
      ctx.font = 'bold 11px sans-serif';
    } else {
      ctx.fillStyle = '#e0e6ed';
      ctx.font = '11px sans-serif';
    }
    ctx.textAlign = 'center';
    const label = n.label.length > 30 ? n.label.substring(0, 28) + '...' : n.label;
    ctx.fillText(label, n.x, n.y + r + 14);
  }
}

function animate() {
  simulate();
  render();
  updateLodIndicator();
  requestAnimationFrame(animate);
}

// ──────────────────────────────────────────────
// 交互
// ──────────────────────────────────────────────
function screenToWorld(sx, sy) {
  return {
    x: (sx - width / 2 - camera.x) / camera.zoom,
    y: (sy - height / 2 - camera.y) / camera.zoom
  };
}

function findNodeAt(sx, sy) {
  const w = screenToWorld(sx, sy);
  // 模块级视图：检测模块圆盘
  if (camera.zoom < 0.6) {
    for (const [mod, agg] of Object.entries(moduleAgg)) {
      const center = MODULE_CENTERS[mod] || MODULE_CENTERS.unknown;
      const r = Math.max(30, Math.sqrt(agg.count) * 8) + 8;
      const dx = w.x - center.x;
      const dy = w.y - center.y;
      if (dx * dx + dy * dy <= r * r) {
        // 返回该模块第一个节点作为代表（用于详情面板）
        return { _isModule: true, module: mod, label: MODULE_LABELS[mod] || mod, ...agg };
      }
    }
    return null;
  }
  // 节点级视图：放大命中区域，方便点击
  const hitR = camera.zoom < 1.2 ? 14 : 10;  // 中等缩放命中半径更大
  for (let i = layoutNodes.length - 1; i >= 0; i--) {
    const n = layoutNodes[i];
    // 实体级视图只命中实体/外部/前端
    if (camera.zoom < 1.2 && n.type === 'endpoint') continue;
    const r = getNodeRadius(n) + hitR;
    const dx = w.x - n.x;
    const dy = w.y - n.y;
    if (dx * dx + dy * dy <= r * r) return n;
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const node = findNodeAt(x, y);
  if (node) {
    if (node._isModule) {
      // 点击模块圆盘：自动放大到实体级，并居中该模块
      const center = MODULE_CENTERS[node.module] || MODULE_CENTERS.unknown;
      camera.zoom = 0.8;
      camera.x = -center.x * camera.zoom;
      camera.y = -center.y * camera.zoom;
      selectedNode = null;
      renderModuleDetail(node);
      return;
    }
    selectedNode = node;
    renderNodeDetail(node);
  } else {
    isDragging = true;
    dragStart = { x: x - camera.x, y: y - camera.y };
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  mousePos = { x, y };
  if (isDragging) {
    camera.x = x - dragStart.x;
    camera.y = y - dragStart.y;
  } else {
    hoverNode = findNodeAt(x, y);
    canvas.style.cursor = hoverNode ? 'pointer' : 'default';
  }
});

canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; hoverNode = null; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.max(0.2, Math.min(4, camera.zoom * delta));
  // 以鼠标为中心缩放
  const wx = (x - width / 2 - camera.x) / camera.zoom;
  const wy = (y - height / 2 - camera.y) / camera.zoom;
  camera.zoom = newZoom;
  camera.x = x - width / 2 - wx * camera.zoom;
  camera.y = y - height / 2 - wy * camera.zoom;
});

// 模块详情面板（点击模块圆盘时显示）
function renderModuleDetail(mod) {
  const panel = document.getElementById('nodeDetail');
  const content = document.getElementById('nodeDetailContent');
  panel.style.display = 'block';

  const agg = moduleAgg[mod.module] || {};
  const redCount = (agg.nodes || []).filter(n => getProbeStatus(n.id) === 'red').length;
  const yellowCount = (agg.nodes || []).filter(n => getProbeStatus(n.id) === 'yellow').length;
  const greenCount = (agg.nodes || []).filter(n => getProbeStatus(n.id) === 'green').length;

  // 该模块的所有跨模块关联
  const crossLinks = moduleEdges.filter(me => me.from === mod.module || me.to === mod.module);

  let html = `
    <div style="margin-bottom:8px">
      <span class="badge badge-entity">模块</span>
    </div>
    <h2>${MODULE_LABELS[mod.module] || mod.module}</h2>
    <div class="subtitle">模块代号：${mod.module}</div>
    <div class="row"><span class="key">节点总数</span><span class="val">${agg.count || 0}</span></div>
    <div class="row"><span class="key">🟢 正常</span><span class="val">${greenCount}</span></div>
    <div class="row"><span class="key">🟡 告警</span><span class="val">${yellowCount}</span></div>
    <div class="row"><span class="key">🔴 断链</span><span class="val" style="color:${redCount > 0 ? '#f85149' : '#e0e6ed'}">${redCount}</span></div>
  `;

  if (crossLinks.length) {
    html += `<div style="margin-top:12px;font-size:12px;color:#58a6ff;font-weight:600">跨模块关联 (${crossLinks.length})</div>`;
    crossLinks.forEach(me => {
      const other = me.from === mod.module ? me.to : me.from;
      html += `<div class="row"><span class="key">${MODULE_LABELS[other] || other}</span><span class="val">${me.count} 条关联</span></div>`;
    });
  }

  // 列出该模块的告警节点
  const problemNodes = (agg.nodes || []).filter(n => {
    const s = getProbeStatus(n.id);
    return s === 'red' || s === 'yellow';
  });
  if (problemNodes.length) {
    html += `<div style="margin-top:12px;font-size:12px;color:#f85149;font-weight:600">⚠️ 问题节点 (${problemNodes.length})</div>`;
    problemNodes.forEach(n => {
      const s = getProbeStatus(n.id);
      const icon = s === 'red' ? '🔴' : '🟡';
      html += `<div class="row"><span class="key">${icon}</span><span class="val" style="cursor:pointer;color:#58a6ff;text-decoration:underline" onclick="jumpToNode('${n.id}')">${n.label}</span></div>`;
    });
  }

  html += `<div style="margin-top:12px;font-size:11px;color:#8b949e">💡 点击节点查看详情，已自动放大到实体级视图</div>`;

  content.innerHTML = html;
}

// 跳转到指定节点（详情面板里的链接点击）
window.jumpToNode = function(nodeId) {
  const n = nodeMap.get(nodeId);
  if (!n) return;
  selectedNode = n;
  camera.zoom = 1.5;
  camera.x = -n.x * camera.zoom;
  camera.y = -n.y * camera.zoom;
  layoutFrozen = false;
  layoutTemperature = 0.3;
  renderNodeDetail(n);
};

// 节点详情面板
function renderNodeDetail(node) {
  const panel = document.getElementById('nodeDetail');
  const content = document.getElementById('nodeDetailContent');
  panel.style.display = 'block';

  const typeLabels = { entity: '数据库实体', endpoint: 'API 接口', external: '外部系统', frontend: '前端' };
  const probe = probeMap.get(node.id);
  const probeStatus = probe?.status || (node.knownIssue ? 'yellow' : 'gray');
  const statusIcons = { green: '🟢 正常', yellow: '🟡 告警', red: '🔴 断链', gray: '⚪ 未探测' };

  let html = `
    <div style="margin-bottom:8px">
      <span class="badge badge-${node.type}">${typeLabels[node.type]}</span>
      ${(node.chain || []).map(c => `<span class="badge badge-chain-${c}">链路${c}</span>`).join('')}
    </div>
    <h2>${node.label}</h2>
    <div class="subtitle">${node.id}</div>
    <div class="row"><span class="key">探测状态</span><span class="val">${statusIcons[probeStatus]}</span></div>
  `;

  if (node.table) html += `<div class="row"><span class="key">数据库表</span><span class="val">${node.table}</span></div>`;
  if (node.module) html += `<div class="row"><span class="key">模块</span><span class="val">${node.module}</span></div>`;
  if (node.method) html += `<div class="row"><span class="key">HTTP方法</span><span class="val">${node.method}</span></div>`;
  if (node.path) html += `<div class="row"><span class="key">路径</span><span class="val">${node.path}</span></div>`;
  if (node.controller) html += `<div class="row"><span class="key">Controller</span><span class="val">${node.controller}</span></div>`;
  if (node.callers?.length) html += `<div class="row"><span class="key">调用方</span><span class="val">${node.callers.join(', ')}</span></div>`;
  if (node.file) html += `<div class="row"><span class="key">文件</span><span class="val" style="font-family:monospace;font-size:10px">${node.file}</span></div>`;
  if (node.fields?.length) html += `<div class="row"><span class="key">关键字段</span><span class="val" style="font-family:monospace;font-size:10px">${node.fields.join(', ')}</span></div>`;
  if (node.knownIssue) html += `<div class="row" style="background:rgba(255,59,48,0.15);padding:6px 8px;border-radius:6px;margin:6px 0"><span class="key" style="color:#ff3b30">⚠️ 已知问题</span><span class="val" style="color:#ff3b30;font-weight:600">${node.knownIssue}</span></div>`;
  if (probe?.error) html += `<div class="row" style="background:rgba(255,59,48,0.15);padding:6px 8px;border-radius:6px;margin:6px 0"><span class="key" style="color:#ff3b30">⚠️ 探测错误</span><span class="val" style="color:#ff3b30;font-weight:600">${probe.error}</span></div>`;
  if (probe?.httpStatus != null) html += `<div class="row"><span class="key">HTTP状态</span><span class="val">${probe.httpStatus}</span></div>`;
  if (probe?.elapsedMs != null) html += `<div class="row"><span class="key">响应时间</span><span class="val">${probe.elapsedMs}ms</span></div>`;

  // 关联边
  const relatedEdges = edges.filter(e => e.from === node.id || e.to === node.id);
  if (relatedEdges.length) {
    html += `<div style="margin-top:12px;font-size:12px;color:#58a6ff;font-weight:600">关联数据流 (${relatedEdges.length})</div>`;
    relatedEdges.forEach(e => {
      const other = e.from === node.id ? nodeMap.get(e.to) : nodeMap.get(e.from);
      if (!other) return;
      const direction = e.from === node.id ? '→' : '←';
      html += `<div class="row"><span class="key">${e.label || e.type}</span><span class="val">${direction} ${other.label}</span></div>`;
    });
  }

  content.innerHTML = html;
}

// ──────────────────────────────────────────────
// 工具栏按钮
// ──────────────────────────────────────────────
document.getElementById('chainFilter').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#chainFilter button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeChain = e.target.dataset.chain;
  initLayout();
});

document.getElementById('btnRefresh').addEventListener('click', () => {
  location.reload();
});

document.getElementById('btnOverview').addEventListener('click', () => {
  camera = { x: 0, y: 0, zoom: 0.45 };
  selectedNode = null;
  document.getElementById('nodeDetail').style.display = 'none';
});

document.getElementById('btnFreeze').addEventListener('click', () => {
  layoutFrozen = !layoutFrozen;
  if (!layoutFrozen) {
    layoutTemperature = 0.5;  // 解冻时给点温度让节点动一下
  }
  const btn = document.getElementById('btnFreeze');
  btn.textContent = layoutFrozen ? '▶️ 解冻布局' : '❄️ 冻结布局';
  btn.style.background = layoutFrozen ? '#2a3142' : '';
});

function updateLodIndicator() {
  const z = camera.zoom;
  const indicator = document.getElementById('lodIndicator');
  if (z < 0.6) {
    indicator.textContent = 'LOD: 模块级（缩小看全局关联）';
    indicator.style.color = '#58a6ff';
  } else if (z < 1.2) {
    indicator.textContent = 'LOD: 实体级（点击节点看关联）';
    indicator.style.color = '#3fb950';
  } else {
    indicator.textContent = 'LOD: 全部节点（放大看细节）';
    indicator.style.color = '#f0883e';
  }
}

document.getElementById('btnProbe').addEventListener('click', async () => {
  const baseUrl = prompt('输入后端 base URL：', 'https://www.webyszl.cn');
  if (!baseUrl) return;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading').querySelector('span').textContent = `探测中... 请稍候`;
  // 探测由后端 Python 脚本执行，前端只读取结果
  alert(`请在终端运行：\npython3 tools/data-link-map/probe/probe_endpoints.py --base-url ${baseUrl}\n\n然后点击「重新加载」查看结果`);
  document.getElementById('loading').style.display = 'none';
});

// ──────────────────────────────────────────────
// 问题列表面板
// ──────────────────────────────────────────────
function renderIssueList() {
  const issues = [];

  // 收集断链节点（红）
  probeMap.forEach((probe, id) => {
    if (probe.status === 'red') {
      const node = nodeMap.get(id);
      issues.push({
        type: 'red',
        node: node,
        title: node ? node.label : id,
        reason: probe.error || '未知错误',
        httpStatus: probe.httpStatus,
        elapsedMs: probe.elapsedMs,
        path: probe.path
      });
    }
  });

  // 收集告警节点（黄）
  probeMap.forEach((probe, id) => {
    if (probe.status === 'yellow') {
      const node = nodeMap.get(id);
      issues.push({
        type: 'yellow',
        node: node,
        title: node ? node.label : id,
        reason: probe.error || 'HTTP 异常',
        httpStatus: probe.httpStatus,
        elapsedMs: probe.elapsedMs,
        path: probe.path
      });
    }
  });

  // 收集已知问题
  nodes.forEach(n => {
    if (n.knownIssue) {
      issues.push({
        type: 'yellow',
        node: n,
        title: n.label,
        reason: n.knownIssue,
        httpStatus: null,
        elapsedMs: null,
        path: n.path
      });
    }
  });

  const content = document.getElementById('issueListContent');

  if (issues.length === 0) {
    content.innerHTML = `
      <div style="text-align:center;padding:40px 20px;color:#7dc88a">
        <div style="font-size:48px;margin-bottom:12px">✓</div>
        <div style="font-size:16px;font-weight:600">全部正常</div>
        <div style="font-size:12px;color:#8b949e;margin-top:8px">当前探测的 ${probeMap.size} 个端点均无问题</div>
      </div>
    `;
    return;
  }

  let html = `<div style="font-size:12px;color:#8b949e;margin-bottom:12px">共 ${issues.length} 个问题，点击可跳转到节点</div>`;
  issues.forEach((issue, idx) => {
    const color = issue.type === 'red' ? '#ff3b30' : '#e8c870';
    const bg = issue.type === 'red' ? 'rgba(255,59,48,0.12)' : 'rgba(232,200,112,0.12)';
    const typeLabel = issue.type === 'red' ? '🔴 断链' : '🟡 告警';
    html += `
      <div class="issue-item" data-idx="${idx}" style="background:${bg};border:1px solid ${color};border-radius:6px;padding:10px;margin-bottom:8px;cursor:pointer;transition:all 0.2s">
        <div style="font-weight:600;color:${color};font-size:13px;margin-bottom:4px">${typeLabel} ${issue.title}</div>
        <div style="font-size:11px;color:#c9d1d9;margin-bottom:4px">${issue.reason}</div>
        ${issue.path ? `<div style="font-size:10px;color:#8b949e;font-family:monospace">${issue.method || 'GET'} ${issue.path}</div>` : ''}
        ${issue.httpStatus != null ? `<div style="font-size:10px;color:#8b949e">HTTP ${issue.httpStatus} · ${issue.elapsedMs}ms</div>` : ''}
      </div>
    `;
  });
  content.innerHTML = html;

  // 点击跳转
  content.querySelectorAll('.issue-item').forEach(item => {
    item.addEventListener('mouseenter', () => {
      item.style.transform = 'translateX(4px)';
    });
    item.addEventListener('mouseleave', () => {
      item.style.transform = 'translateX(0)';
    });
    item.addEventListener('click', () => {
      const idx = parseInt(item.dataset.idx);
      const issue = issues[idx];
      if (issue.node) {
        selectedNode = issue.node;
        camera.targetZoom = 1.5;
        camera.targetX = canvas.width / 2 - issue.node.x * 1.5;
        camera.targetY = canvas.height / 2 - issue.node.y * 1.5;
        showNodeDetail(issue.node);
        document.getElementById('issuePanel').style.display = 'none';
      }
    });
  });
}

document.getElementById('btnIssues').addEventListener('click', () => {
  const panel = document.getElementById('issuePanel');
  const isVisible = panel.style.display !== 'none';
  if (isVisible) {
    panel.style.display = 'none';
  } else {
    document.getElementById('nodeDetail').style.display = 'none';
    panel.style.display = 'block';
    renderIssueList();
  }
});

document.getElementById('btnCloseIssues').addEventListener('click', () => {
  document.getElementById('issuePanel').style.display = 'none';
});

// ──────────────────────────────────────────────
// 启动
// ──────────────────────────────────────────────
window.addEventListener('resize', resizeCanvas);
resizeCanvas();
loadData().then(() => animate());
</script>
